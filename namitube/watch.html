<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Anime - NamiTube</title>
  <meta name="description" content="Watch anime episodes in HD on NamiTube.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .watch-layout { padding-top: var(--header-height); }
    .player-section { background: #000; position: relative; }
    .player-container { position: relative; width: 100%; max-width: 100%; margin: 0 auto; background: #000; }
    .player-container.theater { max-width: 100%; }
    .player-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
    .player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .player-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 5; }
    .player-controls-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: var(--bg-card); border-top: 1px solid var(--border); gap: 16px; flex-wrap: wrap; }
    .player-control-group { display: flex; align-items: center; gap: 12px; }
    .control-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--bg-elevated); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: all var(--transition-fast); border: 1px solid transparent; }
    .control-btn:hover { background: var(--text-muted); color: var(--text-primary); }
    .control-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .episode-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 16px 24px; background: var(--bg-card); border-top: 1px solid var(--border); }
    .nav-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--bg-elevated); border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; transition: all var(--transition-fast); }
    .nav-btn:hover:not(:disabled) { background: var(--text-muted); }
    .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .ep-select { padding: 8px 16px; background: var(--bg-elevated); border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; border: 1px solid var(--border); min-width: 120px; text-align: center; }
    .watch-info-bar { display: flex; align-items: center; gap: 16px; padding: 16px 24px; background: var(--bg-primary); border-bottom: 1px solid var(--border); }
    .watch-info-thumb { width: 60px; aspect-ratio: 2/3; border-radius: 4px; object-fit: cover; }
    .watch-info-text { flex: 1; }
    .watch-info-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
    .watch-info-ep { font-size: 13px; color: var(--text-secondary); }
    .watch-content { display: grid; grid-template-columns: 1fr 320px; gap: 24px; max-width: var(--max-width); margin: 0 auto; padding: 24px; }
    .watch-main { min-width: 0; }
    .watch-sidebar { position: sticky; top: calc(var(--header-height) + 24px); align-self: start; }
    .sidebar-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .sidebar-list { display: flex; flex-direction: column; gap: 8px; max-height: 70vh; overflow-y: auto; }
    .sidebar-ep { display: flex; align-items: center; gap: 12px; padding: 10px; background: var(--bg-card); border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition-fast); border: 1px solid transparent; }
    .sidebar-ep:hover { background: var(--bg-elevated); }
    .sidebar-ep.active { border-color: var(--accent); background: rgba(229, 9, 20, 0.1); }
    .sidebar-ep.watched { opacity: 0.6; }
    .sidebar-ep-num { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--bg-elevated); border-radius: 4px; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .sidebar-ep-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .light-off-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; }
    .light-off-overlay.active { display: block; }
    .keyboard-hint { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 24px; padding: 16px; background: var(--bg-card); border-radius: var(--radius-md); font-size: 12px; color: var(--text-muted); }
    .keyboard-hint span { display: flex; align-items: center; gap: 4px; }
    .key { display: inline-block; padding: 2px 8px; background: var(--bg-elevated); border-radius: 4px; font-family: monospace; font-size: 11px; border: 1px solid var(--border); }
    @media (max-width: 1023px) {
      .watch-content { grid-template-columns: 1fr; }
      .watch-sidebar { position: relative; top: 0; }
      .player-controls-bar { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <div class="light-off-overlay" id="lightOff" onclick="WatchPage.toggleLightOff()"></div>
  <main id="main-content" class="watch-layout">
    <div class="player-section">
      <div class="player-container" id="playerContainer">
        <div class="player-wrapper" id="playerWrapper">
          <div class="player-overlay" id="playerOverlay">
            <div class="spinner"></div>
          </div>
          <iframe id="videoFrame" allowfullscreen sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
        </div>
      </div>
      <div class="player-controls-bar">
        <div class="player-control-group">
          <button class="control-btn active" id="server1Btn" onclick="WatchPage.setServer('megaplay')">Server 1 (MegaPlay)</button>
          <button class="control-btn" id="server2Btn" onclick="WatchPage.setServer('vidnest')">Server 2 (VidNest)</button>
        </div>
        <div class="player-control-group">
          <button class="control-btn" onclick="WatchPage.toggleTheater()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Theater
          </button>
          <button class="control-btn" onclick="WatchPage.toggleLightOff()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            Light Off
          </button>
          <button class="control-btn" onclick="WatchPage.toggleFullscreen()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            Fullscreen
          </button>
        </div>
      </div>
    </div>

    <div class="episode-nav">
      <button class="nav-btn" id="prevBtn" onclick="WatchPage.prevEpisode()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Previous
      </button>
      <select class="ep-select" id="epSelect" onchange="WatchPage.goToEpisode(this.value)"></select>
      <button class="nav-btn" id="nextBtn" onclick="WatchPage.nextEpisode()">
        Next
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); cursor: pointer;">
        <div class="toggle-switch" id="autoPlayToggle" onclick="this.classList.toggle('active')"></div>
        Auto-play
      </label>
      <div style="display: flex; gap: 8px;">
        <button class="control-btn active" id="subBtn" onclick="WatchPage.setLang('sub')">Sub</button>
        <button class="control-btn" id="dubBtn" onclick="WatchPage.setLang('dub')">Dub</button>
      </div>
    </div>

    <div class="watch-info-bar" id="watchInfoBar">
      <div class="skeleton" style="width: 60px; height: 90px; border-radius: 4px;"></div>
      <div class="watch-info-text">
        <div class="skeleton" style="height: 20px; width: 200px; margin-bottom: 8px;"></div>
        <div class="skeleton" style="height: 14px; width: 120px;"></div>
      </div>
      <a href="#" class="btn btn-outline btn-sm" id="detailsLink">View Details</a>
    </div>

    <div class="watch-content">
      <div class="watch-main">
        <div id="synopsisSection"></div>
        <div class="keyboard-hint">
          <span><span class="key">F</span> Fullscreen</span>
          <span><span class="key">N</span> Next Episode</span>
          <span><span class="key">M</span> Mute</span>
          <span><span class="key">Esc</span> Exit</span>
          <span><span class="key">Space</span> Play/Pause</span>
        </div>
      </div>
      <div class="watch-sidebar">
        <div class="sidebar-title">
          <span>Episodes</span>
          <span style="font-size: 12px; color: var(--text-muted);" id="epCount">0</span>
        </div>
        <div class="sidebar-list" id="sidebarList"></div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>
  <script>
    const WatchPage = {
      malId: null,
      anilistId: null,
      currentEp: 1,
      totalEps: 1,
      currentLang: 'sub',
      currentServer: 'megaplay',
      anime: null,
      episodes: [],

      async init() {
        const params = new URLSearchParams(window.location.search);
        this.malId = params.get('id');
        this.currentEp = parseInt(params.get('ep')) || 1;
        this.currentLang = params.get('lang') || 'sub';
        if (!this.malId) {
          window.location.href = 'home.html';
          return;
        }
        try {
          const data = await JikanAPI.getAnime(this.malId);
          this.anime = data.data;
          this.anilistId = this.anime.mal_id;
          this.totalEps = this.anime.episodes || 12;
          try {
            const anilistData = await AniListAPI.getAnime(this.anime.mal_id);
            if (anilistData?.Media?.id) {
              this.anilistId = anilistData.Media.id;
            }
          } catch (e) {}
          this.render();
          this.loadStream();
        } catch (e) {
          App.showToast('Failed to load anime', 'error');
          console.error(e);
        }
      },

      render() {
        const anime = this.anime;
        const poster = anime.images?.jpg?.image_url || '';
        document.getElementById('watchInfoBar').innerHTML = `
          <img src="${poster}" alt="${escapeHtml(anime.title_english || anime.title)}" class="watch-info-thumb">
          <div class="watch-info-text">
            <div class="watch-info-title">${escapeHtml(anime.title_english || anime.title)}</div>
            <div class="watch-info-ep">Episode ${this.currentEp} of ${this.totalEps} &bull; ${this.currentLang.toUpperCase()}</div>
          </div>
          <a href="anime.html?id=${this.malId}" class="btn btn-outline btn-sm">View Details</a>
        `;
        const select = document.getElementById('epSelect');
        select.innerHTML = Array.from({length: this.totalEps}, (_, i) => 
          `<option value="${i + 1}" ${i + 1 === this.currentEp ? 'selected' : ''}>Episode ${i + 1}</option>`
        ).join('');
        document.getElementById('prevBtn').disabled = this.currentEp <= 1;
        document.getElementById('nextBtn').disabled = this.currentEp >= this.totalEps;
        document.getElementById('subBtn').classList.toggle('active', this.currentLang === 'sub');
        document.getElementById('dubBtn').classList.toggle('active', this.currentLang === 'dub');
        document.getElementById('epCount').textContent = this.totalEps;
        const history = Storage.getHistory();
        const sidebar = document.getElementById('sidebarList');
        sidebar.innerHTML = Array.from({length: this.totalEps}, (_, i) => {
          const ep = i + 1;
          const isWatched = history.some(h => h.malId === this.malId && h.episode === ep);
          const isActive = ep === this.currentEp;
          return `
            <div class="sidebar-ep ${isActive ? 'active' : ''} ${isWatched ? 'watched' : ''}" 
                 onclick="window.location.href='watch.html?id=${this.malId}&ep=${ep}&lang=${this.currentLang}'">
              <div class="sidebar-ep-num">${ep}</div>
              <div class="sidebar-ep-title">Episode ${ep}</div>
              ${isWatched ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;color:var(--success)"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
            </div>
          `;
        }).join('');
        document.getElementById('synopsisSection').innerHTML = `
          <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 12px;">Synopsis</h3>
          <p style="color: var(--text-secondary); line-height: 1.7; font-size: 14px;">${escapeHtml(anime.synopsis || 'No synopsis available.')}</p>
        `;
        Storage.addToHistory(anime, this.currentEp, this.currentLang, 0);
      },

      loadStream() {
        const frame = document.getElementById('videoFrame');
        const overlay = document.getElementById('playerOverlay');
        overlay.style.display = 'flex';
        let url;
        if (this.currentServer === 'megaplay') {
          url = `https://megaplay.buzz/stream/mal/${this.malId}/${this.currentEp}/${this.currentLang}`;
        } else {
          url = `https://vidnest.fun/anime/${this.anilistId}/${this.currentEp}/${this.currentLang === 'sub' ? 'sub' : 'dub'}`;
        }
        setTimeout(() => {
          frame.src = url;
          overlay.style.display = 'none';
        }, 1500);
        const newUrl = `watch.html?id=${this.malId}&ep=${this.currentEp}&lang=${this.currentLang}`;
        window.history.replaceState({}, '', newUrl);
      },

      setServer(server) {
        this.currentServer = server;
        document.getElementById('server1Btn').classList.toggle('active', server === 'megaplay');
        document.getElementById('server2Btn').classList.toggle('active', server === 'vidnest');
        this.loadStream();
      },

      setLang(lang) {
        this.currentLang = lang;
        this.render();
        this.loadStream();
      },

      goToEpisode(ep) {
        this.currentEp = parseInt(ep);
        this.render();
        this.loadStream();
      },

      prevEpisode() {
        if (this.currentEp > 1) {
          this.goToEpisode(this.currentEp - 1);
        }
      },

      nextEpisode() {
        if (this.currentEp < this.totalEps) {
          this.goToEpisode(this.currentEp + 1);
        }
      },

      toggleTheater() {
        document.getElementById('playerContainer').classList.toggle('theater');
      },

      toggleLightOff() {
        document.getElementById('lightOff').classList.toggle('active');
      },

      toggleFullscreen() {
        const wrapper = document.getElementById('playerWrapper');
        if (!document.fullscreenElement) {
          wrapper.requestFullscreen?.() || wrapper.webkitRequestFullscreen?.();
        } else {
          document.exitFullscreen?.() || document.webkitExitFullscreen?.();
        }
      }
    };

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      switch(e.key.toLowerCase()) {
        case 'f':
          e.preventDefault();
          WatchPage.toggleFullscreen();
          break;
        case 'n':
          e.preventDefault();
          WatchPage.nextEpisode();
          break;
        case 'm':
          break;
        case ' ':
          e.preventDefault();
          break;
      }
      if (e.key === 'Escape') {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        }
        if (document.getElementById('lightOff').classList.contains('active')) {
          WatchPage.toggleLightOff();
        }
      }
    });

    document.addEventListener('DOMContentLoaded', () => WatchPage.init());
  </script>
</body>
</html>
