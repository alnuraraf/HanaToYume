<body data-page="search">
  <a href="#main-content" class="skip-link">Skip to content</a>
  <header class="site-header" role="banner"></header>
  <main id="main-content" role="main" class="main-content">
    <section class="section">
      <div class="search-input-bar">
        <svg class="search-icon-abs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="searchInput" placeholder="Search anime..." autocomplete="off" aria-label="Search anime">
      </div>

      <div class="filter-panel">
        <select id="filterFormat" aria-label="Format">
          <option value="">All Formats</option>
          <option value="TV">TV</option>
          <option value="MOVIE">Movie</option>
          <option value="OVA">OVA</option>
          <option value="ONA">ONA</option>
          <option value="SPECIAL">Special</option>
        </select>
        <select id="filterStatus" aria-label="Status">
          <option value="">All Status</option>
          <option value="RELEASING">Airing</option>
          <option value="FINISHED">Finished</option>
          <option value="NOT_YET_RELEASED">Upcoming</option>
        </select>
        <select id="filterSort" aria-label="Sort">
          <option value="SEARCH_MATCH">Relevance</option>
          <option value="POPULARITY_DESC">Popularity</option>
          <option value="SCORE_DESC">Score</option>
          <option value="TRENDING_DESC">Trending</option>
          <option value="START_DATE_DESC">Newest</option>
        </select>
        <button class="btn-primary" id="applyFilters" style="padding:8px 16px;font-size:.85rem">Apply</button>
        <button class="btn-outline" id="clearFilters" style="padding:8px 16px;font-size:.85rem">Clear</button>
      </div>

      <div class="results-grid" id="resultsGrid"></div>
      <div id="scrollSentinel" style="height:1px"></div>
    </section>
  </main>
  <footer class="site-footer" role="contentinfo"></footer>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/search.js"></script>
</body>
</html>
