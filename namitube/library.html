<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Library — NamiTube</title>
  <meta name="description" content="Your personal anime library. Manage your watchlist, favourites, and watch history." />
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/library.css" />
  <link rel="stylesheet" href="css/home.css" />
  <meta property="og:title" content="Library — NamiTube" />
  <meta property="og:description" content="Your personal anime library. Manage your watchlist, favourites, and watch history." />
  <meta property="og:type" content="website" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div id="header-slot"></div>

  <main id="main" role="main" class="container library-wrap">
    <div class="library-head">
      <h1>My Library</h1>
      <div class="actions">
        <button class="btn btn-secondary btn-sm" id="exportBtn"></button>
        <button class="btn btn-ghost btn-sm" id="clearBtn"></button>
      </div>
    </div>

    <div class="lib-tabs" role="tablist">
      <button class="lib-tab active" data-tab="watchlist" role="tab" aria-selected="true">
        Watchlist <span class="count">0</span>
      </button>
      <button class="lib-tab" data-tab="favorites" role="tab" aria-selected="false">
        Favourites <span class="count">0</span>
      </button>
      <button class="lib-tab" data-tab="history" role="tab" aria-selected="false">
        History <span class="count">0</span>
      </button>
    </div>

    <div class="lib-toolbar">
      <label>Sort by:</label>
      <select id="sortSelect">
        <option value="date">Date Added</option>
        <option value="title">Title</option>
        <option value="score">Score</option>
      </select>
    </div>

    <div id="libContent" role="tabpanel"></div>
  </main>

  <div id="footer-slot"></div>

  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/storage.js" defer></script>
  <script src="js/components.js" defer></script>
  <script src="js/library.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const profile = NT.storage.getProfile();
      if (profile.preferences.accentColor) NT.utils.applyAccentColor(profile.preferences.accentColor);
      NT.components.injectChrome();

      // Initial button labels
      document.getElementById('exportBtn').innerHTML = NT.components.Icons.download + ' Export';
      document.getElementById('clearBtn').innerHTML = NT.components.Icons.trash + ' Clear History';

      // Allow hash to switch tabs
      const hash = location.hash.replace('#', '');
      if (['watchlist', 'favorites', 'history'].includes(hash)) {
        document.querySelectorAll('.lib-tab').forEach(t => {
          t.classList.toggle('active', t.dataset.tab === hash);
        });
        NT.libraryPage.currentTab = hash;
      }

      await NT.libraryPage.init();
    });
  </script>
</body>
</html>
