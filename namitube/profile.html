<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="view-transition" content="same-origin">
  <title>Profile — NamiTube</title>
  <meta name="description" content="Your NamiTube profile. View stats and customize your experience.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="profile">
  <a href="#main-content" class="skip-link">Skip to content</a>
  <header class="site-header" role="banner"></header>
  <main id="main-content" role="main" class="main-content">
    <div class="profile-hero">
      <div class="profile-avatar" id="profileAvatar"></div>
      <h1 class="profile-name" id="profileName">Anime Watcher</h1>
      <p class="profile-since" id="profileSince">Member since 2026</p>
      <div class="profile-stats">
        <div class="profile-stat"><div class="ps-num" id="statEpisodes">0</div><div class="ps-label">Episodes</div></div>
        <div class="profile-stat"><div class="ps-num" id="statWatchlist">0</div><div class="ps-label">Watchlist</div></div>
        <div class="profile-stat"><div class="ps-num" id="statFavorites">0</div><div class="ps-label">Favorites</div></div>
      </div>
    </div>
    <div class="profile-form">
      <h2 class="section-title" style="margin-bottom:20px">Edit Profile</h2>
      <div class="form-group">
        <label for="nameInput">Display Name</label>
        <input type="text" id="nameInput" placeholder="Your name" maxlength="30">
      </div>
      <div class="form-group">
        <label for="avatarInput">Avatar URL</label>
        <input type="url" id="avatarInput" placeholder="https://example.com/avatar.jpg">
        <div id="avatarPreview" style="margin-top:8px"></div>
      </div>
      <button class="btn-primary" id="saveProfile">Save Profile</button>
    </div>
  </main>
  <footer class="site-footer" role="contentinfo"></footer>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/profile.js"></script>
</body>
</html>
