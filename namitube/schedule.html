<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airing Schedule - NamiTube</title>
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="preconnect" href="https://api.jikan.moe">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .day-tabs { display: flex; gap: 8px; padding: 0 24px 24px; overflow-x: auto; }
    .day-tab { padding: 10px 20px; background: var(--bg-card); border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid transparent; transition: all var(--transition-fast); }
    .day-tab.active { background: var(--accent); color: white; }
    .day-tab.today { position: relative; }
    .day-tab.today::after { content: ''; position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; background: var(--success); border-radius: 50%; }
    .schedule-list { max-width: 800px; margin: 0 auto; padding: 0 24px; }
    .schedule-item { display: flex; align-items: center; gap: 16px; padding: 16px; background: var(--bg-card); border-radius: var(--radius-md); margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; transition: border-color var(--transition-fast); }
    .schedule-item:hover { border-color: var(--text-muted); }
    .schedule-time { font-family: monospace; font-size: 14px; color: var(--accent); font-weight: 600; width: 60px; }
    .schedule-thumb { width: 50px; aspect-ratio: 2/3; border-radius: 4px; object-fit: cover; }
    .schedule-title { flex: 1; font-weight: 500; }
    .schedule-ep { font-size: 13px; color: var(--text-secondary); }
  </style>
</head>
<body>
  <main id="main-content" style="padding-top: calc(var(--header-height) + 40px);">
    <div class="page-header">
      <h1 class="page-title">Airing Schedule</h1>
      <p class="page-subtitle">See what's airing today and plan your week</p>
    </div>
    <div class="day-tabs" id="dayTabs">
      <button class="day-tab" data-day="monday">Mon</button>
      <button class="day-tab" data-day="tuesday">Tue</button>
      <button class="day-tab" data-day="wednesday">Wed</button>
      <button class="day-tab" data-day="thursday">Thu</button>
      <button class="day-tab" data-day="friday">Fri</button>
      <button class="day-tab" data-day="saturday">Sat</button>
      <button class="day-tab" data-day="sunday">Sun</button>
    </div>
    <div class="schedule-list" id="scheduleList">
      <div class="skeleton" style="height: 80px; margin-bottom: 12px;"></div>
      <div class="skeleton" style="height: 80px; margin-bottom: 12px;"></div>
      <div class="skeleton" style="height: 80px; margin-bottom: 12px;"></div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>
  <script>
    const SchedulePage = {
      async init() {
        const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
        const today = days[new Date().getDay()];
        document.querySelectorAll('.day-tab').forEach(tab => {
          if (tab.dataset.day === today) tab.classList.add('today', 'active');
          tab.addEventListener('click', () => this.loadDay(tab.dataset.day));
        });
        this.loadDay(today);
      },
      async loadDay(day) {
        document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`[data-day="${day}"]`)?.classList.add('active');
        try {
          const data = await JikanAPI.getSchedule(day);
          const list = document.getElementById('scheduleList');
          if (!data.data?.length) {
            list.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">No anime scheduled for this day</p>';
            return;
          }
          list.innerHTML = data.data.map(anime => `
            <div class="schedule-item" onclick="window.location.href='anime.html?id=${anime.mal_id}'">
              <div class="schedule-time">${anime.broadcast?.time || 'TBA'}</div>
              <img src="${anime.images?.jpg?.image_url || ''}" alt="" class="schedule-thumb" loading="lazy">
              <div class="schedule-title">${escapeHtml(anime.title_english || anime.title)}</div>
              <div class="schedule-ep">Ep ${anime.episodes || '?'}</div>
              <button class="btn btn-primary btn-sm">Watch</button>
            </div>
          `).join('');
        } catch (e) {
          console.error(e);
        }
      }
    };
    document.addEventListener('DOMContentLoaded', () => SchedulePage.init());
  </script>
</body>
</html>
