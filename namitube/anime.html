<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anime — NamiTube</title>
<meta name="description" content="View anime details, episodes, characters, and reviews on NamiTube."/>
<link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/reset.css"/>
<link rel="stylesheet" href="css/variables.css"/>
<link rel="stylesheet" href="css/animations.css"/>
<link rel="stylesheet" href="css/global.css"/>
<link rel="stylesheet" href="css/anime.css"/>
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<div id="header-placeholder"></div>

<main id="main" role="main">
  <div class="anime-banner" id="animeBanner"></div>
  <div class="container">
    <div class="anime-main">
      <article class="anime-content" id="animeContent">
        <div class="skel" style="height:240px;border-radius:var(--radius-md);"></div>
      </article>
      <aside class="anime-sidebar" id="animeSidebar" role="complementary"></aside>
    </div>

    <section class="section">
      <div class="section-head"><h2 class="section-title">Episodes</h2></div>
      <div class="episode-controls">
        <div class="tab-group">
          <button class="tab-btn active" data-lang="sub">Sub</button>
          <button class="tab-btn" data-lang="dub">Dub</button>
        </div>
        <span class="text-muted" id="epCount"></span>
      </div>
      <div class="episode-grid" id="episodeGrid"></div>
      <div class="pagination" id="epPagination"></div>
    </section>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://unpkg.com/lucide@latest"></script>
<script defer src="js/utils.js"></script>
<script defer src="js/api.js"></script>
<script defer src="js/storage.js"></script>
<script defer src="js/components.js"></script>
<script defer>
const PAGE_SIZE = 24;
let currentLang = 'sub';
let currentEpPage = 1;
let allEpisodes = [];
let animeData = null;

document.addEventListener('DOMContentLoaded', async () => {
  Components.mount();
  const id = Utils.getParam('id');
  if (!id) { document.getElementById('animeContent').innerHTML = '<p>Missing anime ID.</p>'; return; }

  try {
    const [animeRes, alData] = await Promise.all([
      API.getAnime(id),
      API.aniListByMal(id).catch(() => null)
    ]);
    animeData = animeRes.data;
    document.title = animeData.title + ' — NamiTube';
    renderBanner(animeData, alData?.Media);
    renderContent(animeData, alData?.Media);
    renderSidebar(animeData);
    loadEpisodes(id);
    loadCharacters(id);
    loadStaff(id);
    loadRecommendations(id);
    loadReviews(id);
  } catch (e) {
    console.error(e);
    document.getElementById('animeContent').innerHTML = '<p>Failed to load anime.</p>';
  }
});

function renderBanner(a, al) {
  const banner = al?.bannerImage || a.trailer?.images?.maximum_image_url || a.images?.jpg?.large_image_url || '';
  document.getElementById('animeBanner').style.backgroundImage = `url('${banner}')`;
}

function renderContent(a, al) {
  const el = document.getElementById('animeContent');
  const syn = a.synopsis || al?.description || 'No synopsis available.';
  const trailerId = a.trailer?.youtube_id || (al?.trailer?.site === 'youtube' ? al.trailer.id : null);
  const userRating = Storage.getRating(a.mal_id);

  el.innerHTML = `
    <h1 class="anime-title">${Utils.escapeHtml(a.title)}</h1>
    <p class="anime-alt-title">${Utils.escapeHtml([a.title_english, a.title_japanese].filter(x => x && x !== a.title).join(' · '))}</p>

    <div class="anime-meta-row">
      ${a.score ? `<div class="meta-cell"><span class="meta-label">Score</span><span class="meta-value score"><i data-lucide="star" style="width:14px;height:14px;"></i>${a.score}</span></div>`:''}
      ${a.rank ? `<div class="meta-cell"><span class="meta-label">Rank</span><span class="meta-value">#${a.rank}</span></div>`:''}
      ${a.popularity ? `<div class="meta-cell"><span class="meta-label">Popularity</span><span class="meta-value">#${a.popularity}</span></div>`:''}
      <div class="meta-cell"><span class="meta-label">Status</span><span class="meta-value">${Utils.escapeHtml(a.status||'—')}</span></div>
      <div class="meta-cell"><span class="meta-label">Episodes</span><span class="meta-value">${a.episodes||'?'}</span></div>
      <div class="meta-cell"><span class="meta-label">Duration</span><span class="meta-value">${Utils.escapeHtml(a.duration||'—')}</span></div>
      ${a.season ? `<div class="meta-cell"><span class="meta-label">Season</span><span class="meta-value">${a.season} ${a.year||''}</span></div>`:''}
      ${a.studios?.[0] ? `<div class="meta-cell"><span class="meta-label">Studio</span><span class="meta-value">${Utils.escapeHtml(a.studios[0].name)}</span></div>`:''}
    </div>

    <div class="anime-genres">
      ${(a.genres||[]).map(g => Components.GenreTag(g.name, `search.html?q=${encodeURIComponent(g.name)}`)).join('')}
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;">
      <a href="watch.html?id=${a.mal_id}&ep=1&lang=sub" class="btn btn-primary btn-lg"><i data-lucide="play"></i>Watch Episode 1</a>
    </div>

    <div class="synopsis-block">
      <h3>Synopsis</h3>
      <p class="synopsis-text collapsed" id="synText">${Utils.escapeHtml(syn)}</p>
      <button class="expand-btn" id="expandSyn">Read more</button>
    </div>

    ${trailerId ? `<div class="synopsis-block"><h3>Trailer</h3>
      <div class="trailer-wrap"><iframe src="https://www.youtube.com/embed/${trailerId}" allowfullscreen title="Trailer"></iframe></div>
    </div>` : ''}

    <section class="section" id="charsSection">
      <div class="section-head"><h2 class="section-title">Characters & Voice Actors</h2></div>
      <div class="scroll-row" id="charsRow"></div>
    </section>

    <section class="section" id="staffSection">
      <div class="section-head"><h2 class="section-title">Staff</h2></div>
      <div class="scroll-row" id="staffRow"></div>
    </section>

    <section class="section" id="recsSection">
      <div class="section-head"><h2 class="section-title">Recommendations</h2></div>
      <div class="anime-grid" id="recsGrid"></div>
    </section>

    <section class="section" id="reviewsSection">
      <div class="section-head"><h2 class="section-title">Reviews</h2></div>
      <div id="reviewsList"></div>
    </section>
  `;
  Utils.initIcons();

  // Expandable synopsis
  document.getElementById('expandSyn').onclick = (e) => {
    const t = document.getElementById('synText');
    t.classList.toggle('collapsed');
    e.target.textContent = t.classList.contains('collapsed') ? 'Read more' : 'Show less';
  };
}

function renderSidebar(a) {
  const sb = document.getElementById('animeSidebar');
  const malId = a.mal_id;
  const inWl = Storage.inWatchlist(malId);
  const inFav = Storage.inFavorites(malId);
  const userRating = Storage.getRating(malId);

  sb.innerHTML = `
    <div class="sidebar-poster"><img src="${a.images?.jpg?.large_image_url||''}" alt="${Utils.escapeHtml(a.title)} poster"/></div>

    <div class="sidebar-card">
      <h3>Actions</h3>
      <div class="action-btns">
        <button class="btn ${inWl?'btn-primary':'btn-secondary'}" id="wlBtn"><i data-lucide="bookmark"></i>${inWl?'In Watchlist':'Add to Watchlist'}</button>
        <button class="btn ${inFav?'btn-primary':'btn-secondary'}" id="favBtn"><i data-lucide="heart"></i>${inFav?'Favourited':'Add to Favourites'}</button>
        <button class="btn btn-secondary" id="watchingBtn"><i data-lucide="play-circle"></i>Mark as Watching</button>
      </div>
    </div>

    <div class="sidebar-card">
      <h3>Your Rating</h3>
      ${Components.RatingStars(userRating, (v) => {
        Storage.setRating(malId, v);
        Components.Toast('Rating saved: ' + v + '/10', 'success');
      })}
    </div>

    ${a.score ? `<div class="sidebar-card">
      <h3>Score Breakdown</h3>
      <div class="score-bars">
        ${[10,9,8,7,6,5].map(n => {
          const pct = Math.max(5, Math.round((11-n) * (n === Math.round(a.score) ? 100 : 60 - Math.abs(n-a.score)*15)));
          const v = Math.max(0, Math.min(100, pct));
          return `<div class="score-bar-row"><span class="score-bar-num">${n}</span><div class="score-bar-track"><div class="score-bar-fill" style="width:${v}%"></div></div><span class="score-bar-val">${v}%</span></div>`;
        }).join('')}
      </div>
    </div>`:''}

    <div class="sidebar-card">
      <h3>Information</h3>
      <table class="info-table">
        <tr><td>Type</td><td>${a.type||'—'}</td></tr>
        <tr><td>Source</td><td>${a.source||'—'}</td></tr>
        <tr><td>Episodes</td><td>${a.episodes||'?'}</td></tr>
        <tr><td>Status</td><td>${a.status||'—'}</td></tr>
        <tr><td>Aired</td><td>${a.aired?.string||'—'}</td></tr>
        <tr><td>Broadcast</td><td>${a.broadcast?.string||'—'}</td></tr>
        <tr><td>Producers</td><td>${(a.producers||[]).map(p=>p.name).join(', ')||'—'}</td></tr>
        <tr><td>Licensors</td><td>${(a.licensors||[]).map(p=>p.name).join(', ')||'—'}</td></tr>
        <tr><td>Studios</td><td>${(a.studios||[]).map(p=>p.name).join(', ')||'—'}</td></tr>
        <tr><td>Genres</td><td>${(a.genres||[]).map(p=>p.name).join(', ')||'—'}</td></tr>
        <tr><td>Themes</td><td>${(a.themes||[]).map(p=>p.name).join(', ')||'—'}</td></tr>
        <tr><td>Demographics</td><td>${(a.demographics||[]).map(p=>p.name).join(', ')||'—'}</td></tr>
        <tr><td>Duration</td><td>${a.duration||'—'}</td></tr>
        <tr><td>Rating</td><td>${a.rating||'—'}</td></tr>
      </table>
    </div>
  `;
  Utils.initIcons();

  document.getElementById('wlBtn').onclick = (e) => {
    if (Storage.inWatchlist(malId)) {
      Storage.removeFromWatchlist(malId);
      Components.Toast('Removed from watchlist', 'info');
    } else {
      Storage.addToWatchlist({ malId, title: a.title, posterUrl: a.images?.jpg?.large_image_url, score: a.score||0 });
      Components.Toast('Added to watchlist', 'success');
    }
    renderSidebar(a);
  };
  document.getElementById('favBtn').onclick = () => {
    if (Storage.inFavorites(malId)) {
      Storage.removeFromFavorites(malId);
      Components.Toast('Removed from favourites', 'info');
    } else {
      Storage.addToFavorites({ malId, title: a.title, posterUrl: a.images?.jpg?.large_image_url, score: a.score||0 });
      Components.Toast('Added to favourites', 'success');
    }
    renderSidebar(a);
  };
  document.getElementById('watchingBtn').onclick = () => {
    Storage.addToWatchlist({ malId, title: a.title, posterUrl: a.images?.jpg?.large_image_url, score: a.score||0 }, 'watching');
    Storage.setWatchlistStatus(malId, 'watching');
    Components.Toast('Marked as watching', 'success');
    renderSidebar(a);
  };
}

async function loadEpisodes(id) {
  const grid = document.getElementById('episodeGrid');
  grid.innerHTML = '<div style="grid-column:1/-1;"><div class="spinner" style="margin:24px auto;"></div></div>';
  try {
    const r = await API.getEpisodes(id);
    allEpisodes = r.data || [];
    if (!allEpisodes.length && animeData?.episodes) {
      // fallback synthesize
      allEpisodes = Array.from({ length: animeData.episodes }, (_, i) => ({
        mal_id: i + 1, title: `Episode ${i+1}`
      }));
    }
    document.getElementById('epCount').textContent = `${allEpisodes.length} episode${allEpisodes.length===1?'':'s'}`;
    renderEpisodePage(1);
  } catch (e) {
    grid.innerHTML = '<p class="text-muted" style="grid-column:1/-1;">Failed to load episodes.</p>';
  }

  document.querySelectorAll('.tab-group .tab-btn').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('.tab-group .tab-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      currentLang = b.dataset.lang;
      renderEpisodePage(currentEpPage);
    };
  });
}

function renderEpisodePage(page) {
  currentEpPage = page;
  const grid = document.getElementById('episodeGrid');
  const start = (page - 1) * PAGE_SIZE;
  const items = allEpisodes.slice(start, start + PAGE_SIZE);
  const malId = animeData.mal_id;

  grid.innerHTML = items.map(ep => {
    const epNum = ep.mal_id || ep.number;
    const watched = Storage.isEpisodeWatched(malId, epNum);
    return `
      <a class="ep-card" href="watch.html?id=${malId}&ep=${epNum}&lang=${currentLang}">
        <div class="ep-num">${String(epNum).padStart(2,'0')}</div>
        <div class="ep-text">
          <div class="ep-title">${Utils.escapeHtml(ep.title || 'Episode ' + epNum)}</div>
        </div>
        ${watched ? '<i data-lucide="check-circle" class="ep-watched" style="width:16px;height:16px;"></i>' : ''}
      </a>`;
  }).join('');
  Utils.initIcons();

  // pagination
  const totalPages = Math.ceil(allEpisodes.length / PAGE_SIZE);
  const pag = document.getElementById('epPagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="${i===page?'active':''}" data-page="${i}">${i}</button>`;
  }
  pag.innerHTML = html;
  pag.querySelectorAll('button').forEach(b => b.onclick = () => renderEpisodePage(Number(b.dataset.page)));
}

async function loadCharacters(id) {
  const row = document.getElementById('charsRow');
  try {
    const r = await API.getCharacters(id);
    const chars = (r.data || []).slice(0, 18);
    if (!chars.length) { document.getElementById('charsSection').style.display = 'none'; return; }
    row.innerHTML = chars.map(c => {
      const va = c.voice_actors?.find(v => v.language === 'Japanese') || c.voice_actors?.[0];
      return `
        <div class="char-card">
          <img class="char-img" src="${c.character.images?.jpg?.image_url||''}" alt="${Utils.escapeHtml(c.character.name)}"/>
          <div class="char-info">
            <div class="char-name">${Utils.escapeHtml(c.character.name)}</div>
            <div class="char-role">${c.role}</div>
            ${va ? `<div class="char-va">${Utils.escapeHtml(va.person.name)}</div>`:''}
          </div>
        </div>`;
    }).join('');
  } catch (e) { document.getElementById('charsSection').style.display = 'none'; }
}

async function loadStaff(id) {
  const row = document.getElementById('staffRow');
  try {
    const r = await API.getStaff(id);
    const staff = (r.data || []).slice(0, 12);
    if (!staff.length) { document.getElementById('staffSection').style.display = 'none'; return; }
    row.innerHTML = staff.map(s => `
      <div class="char-card">
        <img class="char-img" src="${s.person.images?.jpg?.image_url||''}" alt="${Utils.escapeHtml(s.person.name)}"/>
        <div class="char-info">
          <div class="char-name">${Utils.escapeHtml(s.person.name)}</div>
          <div class="char-role">${(s.positions||[]).join(', ')}</div>
        </div>
      </div>`).join('');
  } catch (e) { document.getElementById('staffSection').style.display = 'none'; }
}

async function loadRecommendations(id) {
  const grid = document.getElementById('recsGrid');
  try {
    const r = await API.getRecommendations(id);
    const recs = (r.data || []).slice(0, 6).map(x => x.entry);
    if (!recs.length) { document.getElementById('recsSection').style.display = 'none'; return; }
    grid.innerHTML = recs.map(a => Components.AnimeCard(a, { showActions: false })).join('');
    Utils.initIcons();
  } catch (e) { document.getElementById('recsSection').style.display = 'none'; }
}

async function loadReviews(id) {
  const list = document.getElementById('reviewsList');
  try {
    const r = await API.getReviews(id);
    const reviews = (r.data || []).slice(0, 3);
    if (!reviews.length) { document.getElementById('reviewsSection').style.display = 'none'; return; }
    list.innerHTML = reviews.map(rv => `
      <div class="review">
        <div class="review-head">
          <img class="review-avatar" src="${rv.user.images?.jpg?.image_url||''}" alt=""/>
          <div>
            <div class="review-author">${Utils.escapeHtml(rv.user.username)}</div>
            <div class="review-date">${new Date(rv.date).toLocaleDateString()}</div>
          </div>
          <div class="review-score"><i data-lucide="star" style="width:14px;height:14px;"></i>${rv.score}/10</div>
        </div>
        <div class="review-body">${Utils.escapeHtml(rv.review)}</div>
        <button class="expand-btn">Read more</button>
      </div>
    `).join('');
    list.querySelectorAll('.expand-btn').forEach(b => {
      b.onclick = (e) => {
        const body = e.target.previousElementSibling;
        body.classList.toggle('open');
        e.target.textContent = body.classList.contains('open') ? 'Show less' : 'Read more';
      };
    });
    Utils.initIcons();
  } catch (e) { document.getElementById('reviewsSection').style.display = 'none'; }
}
</script>
</body>
</html>
