<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Loading… — NamiTube</title>
  <meta name="description" content="View anime details, characters, episodes, and reviews on NamiTube." />
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/anime.css" />
  <meta property="og:type" content="website" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div id="header-slot"></div>

  <main id="main" role="main">
    <!-- Hero banner -->
    <div class="anime-hero" id="hero" aria-hidden="true">
      <img id="heroImg" alt="" />
    </div>

    <div class="container">
      <div class="anime-layout">
        <!-- Main content -->
        <div class="anime-main" id="main-content">
          <div id="titleBlock"></div>
          <div id="genresBlock"></div>
          <p class="anime-synopsis collapsed" id="synopsis"></p>
          <button class="read-more-btn" id="readMore">Read more</button>

          <div class="trailer-wrap" id="trailerWrap" style="display:none">
            <iframe id="trailer" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" title="Trailer"></iframe>
          </div>

          <h3 class="section-head" style="margin-top:var(--space-12);font-size:var(--fs-lg)">Characters & Voice Actors</h3>
          <div class="people-row" id="characters"></div>

          <h3 class="section-head" style="font-size:var(--fs-lg)">Staff</h3>
          <div class="people-row" id="staff"></div>

          <h3 class="section-head" style="font-size:var(--fs-lg)">You Might Also Like</h3>
          <div class="anime-grid" id="recommendations"></div>

          <h3 class="section-head" style="font-size:var(--fs-lg)">Reviews</h3>
          <div class="reviews-list" id="reviews"></div>

          <div class="episodes-section" id="episodesSection">
            <div class="section-head">
              <h2 style="font-size:var(--fs-xl)">Episodes</h2>
              <span class="ep-count" id="epCount">—</span>
            </div>
            <div class="ep-filter-bar">
              <div class="lang-toggle" role="group" aria-label="Language">
                <button class="active" data-lang="sub">Sub</button>
                <button data-lang="dub">Dub</button>
              </div>
            </div>
            <div class="ep-grid" id="epGrid"></div>
            <div class="ep-pagination" id="epPagination"></div>
          </div>
        </div>

        <!-- Sidebar -->
        <aside class="anime-side" id="side" role="complementary" aria-label="Anime details">
          <div class="poster">
            <img id="sidePoster" alt="Poster" />
          </div>
          <div class="profile-card" style="padding:var(--space-4)">
            <h3 style="font-size:var(--fs-sm);margin-bottom:var(--space-3)">User Rating</h3>
            <div id="userRating"></div>
          </div>
          <div class="action-buttons">
            <button class="btn btn-primary btn-block" id="watchlistBtn"></button>
            <button class="btn btn-secondary btn-block" id="favBtn"></button>
            <button class="btn btn-ghost btn-block" id="trailerToggle" style="display:none">Watch Trailer</button>
          </div>
          <div class="info-table" id="infoTable"></div>
        </aside>
      </div>
    </div>
  </main>

  <div id="footer-slot"></div>

  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/storage.js" defer></script>
  <script src="js/components.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const profile = NT.storage.getProfile();
      if (profile.preferences.accentColor) NT.utils.applyAccentColor(profile.preferences.accentColor);
      NT.components.injectChrome();

      const params = new URLSearchParams(location.search);
      const id = parseInt(params.get('id'), 10);
      if (!id) { document.getElementById('main-content').innerHTML = '<p style="padding:var(--space-12);text-align:center">No anime ID provided.</p>'; return; }

      let epPage = 1;
      let epData = [];
      let epTotalPages = 1;
      const EP_PER_PAGE = 24;
      let currentLang = profile.preferences.defaultLang || 'sub';

      try {
        // Fetch all in parallel
        const [animeRes, episodesRes, charsRes, staffRes, recsRes, reviewsRes] = await Promise.all([
          NT.api.animeById(id),
          NT.api.episodes(id, 1).catch(() => ({ data: [], pagination: null })),
          NT.api.characters(id).catch(() => ({ data: [] })),
          NT.api.staff(id).catch(() => ({ data: [] })),
          NT.api.recommendations(id).catch(() => ({ data: [] })),
          NT.api.reviews(id).catch(() => ({ data: [] }))
        ]);

        const anime = animeRes.data;
        epData = episodesRes.data || [];

        // Update document metadata
        document.title = `${anime.title} — NamiTube`;
        const meta = document.querySelector('meta[name="description"]');
        if (meta) meta.content = (anime.synopsis || '').slice(0, 160);
        const ogTitle = document.createElement('meta'); ogTitle.setAttribute('property', 'og:title'); ogTitle.content = anime.title; document.head.appendChild(ogTitle);
        const ogDesc = document.createElement('meta'); ogDesc.setAttribute('property', 'og:description'); ogDesc.content = (anime.synopsis || '').slice(0, 200); document.head.appendChild(ogDesc);
        const ogImg = document.createElement('meta'); ogImg.setAttribute('property', 'og:image'); ogImg.content = anime.images?.jpg?.large_image_url || ''; document.head.appendChild(ogImg);

        // Hero background
        const heroBg = anime.trailer?.images?.maximum_image_url
          || anime.images?.jpg?.large_image_url
          || anime.images?.jpg?.image_url;
        document.getElementById('heroImg').src = heroBg;
        document.getElementById('heroImg').alt = anime.title;

        // Title block
        const titleBlock = document.getElementById('titleBlock');
        const altTitles = [anime.title_japanese, anime.title_english].filter(t => t && t !== anime.title).join(' • ');
        titleBlock.innerHTML = `
          <h1 class="anime-title">${anime.title}</h1>
          ${altTitles ? `<p class="anime-alt-titles">${altTitles}</p>` : ''}
          <div class="anime-meta">
            ${anime.score ? `<div class="item"><span class="label">Score</span><span class="value score">★ ${NT.utils.Formatters.score(anime.score)}</span></div>` : ''}
            ${anime.rank ? `<div class="item"><span class="label">Rank</span><span class="value">#${anime.rank}</span></div>` : ''}
            ${anime.popularity ? `<div class="item"><span class="label">Popularity</span><span class="value">#${anime.popularity}</span></div>` : ''}
            ${anime.status ? `<div class="item"><span class="label">Status</span><span class="value">${anime.status}</span></div>` : ''}
            ${anime.episodes ? `<div class="item"><span class="label">Episodes</span><span class="value">${anime.episodes}</span></div>` : ''}
            ${anime.duration ? `<div class="item"><span class="label">Duration</span><span class="value">${anime.duration}</span></div>` : ''}
            ${anime.studios?.length ? `<div class="item"><span class="label">Studio</span><span class="value">${anime.studios.map(s => s.name).join(', ')}</span></div>` : ''}
          </div>
        `;

        // Genres
        const genresBlock = document.getElementById('genresBlock');
        (anime.genres || []).forEach(g => {
          const tag = document.createElement('a');
          tag.className = 'tag tag-genre';
          tag.href = `search.html?genre=${g.mal_id}`;
          tag.textContent = g.name;
          genresBlock.appendChild(tag);
        });
        (anime.themes || []).slice(0, 4).forEach(t => {
          const tag = document.createElement('a');
          tag.className = 'tag tag-outline';
          tag.href = `search.html?q=${encodeURIComponent(t.name)}`;
          tag.textContent = t.name;
          genresBlock.appendChild(tag);
        });

        // Synopsis
        const synopsisEl = document.getElementById('synopsis');
        synopsisEl.textContent = anime.synopsis || 'No synopsis available.';
        document.getElementById('readMore').addEventListener('click', () => {
          synopsisEl.classList.toggle('collapsed');
          document.getElementById('readMore').textContent = synopsisEl.classList.contains('collapsed') ? 'Read more' : 'Read less';
        });

        // Trailer
        if (anime.trailer?.embed_url) {
          const trailerWrap = document.getElementById('trailerWrap');
          const trailer = document.getElementById('trailer');
          trailer.src = anime.trailer.embed_url;
          trailerWrap.style.display = 'block';
          const trailerToggle = document.getElementById('trailerToggle');
          trailerToggle.style.display = 'inline-flex';
          trailerToggle.addEventListener('click', () => trailerWrap.scrollIntoView({ behavior: 'smooth' }));
        }

        // Sidebar poster
        document.getElementById('sidePoster').src = anime.images?.jpg?.large_image_url || '';

        // Info table
        const rows = [
          ['Type', anime.type],
          ['Source', anime.source],
          ['Episodes', anime.episodes],
          ['Status', anime.status],
          ['Aired', anime.aired?.string],
          ['Broadcast', anime.broadcast?.string],
          ['Producers', (anime.producers || []).map(p => p.name).join(', ')],
          ['Licensors', (anime.licensors || []).map(l => l.name).join(', ')],
          ['Studios', (anime.studios || []).map(s => s.name).join(', ')],
          ['Genres', (anime.genres || []).map(g => `<a href="search.html?genre=${g.mal_id}">${g.name}</a>`).join(', ')],
          ['Themes', (anime.themes || []).map(t => t.name).join(', ')],
          ['Demographics', (anime.demographics || []).map(d => d.name).join(', ')],
          ['Duration', anime.duration],
          ['Rating', anime.rating]
        ];
        const infoTable = document.getElementById('infoTable');
        rows.forEach(([k, v]) => {
          if (!v) return;
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `<div class="k">${k}</div><div class="v">${v}</div>`;
          infoTable.appendChild(row);
        });

        // Action buttons
        const wlBtn = document.getElementById('watchlistBtn');
        const favBtn = document.getElementById('favBtn');
        function renderWatchlistBtn() {
          const inList = NT.storage.isInWatchlist(id);
          wlBtn.innerHTML = (inList ? NT.components.Icons.check : NT.components.Icons.plus) + ' ' + (inList ? 'In Watchlist' : 'Add to Watchlist');
          wlBtn.classList.toggle('btn-secondary', inList);
        }
        function renderFavBtn() {
          const inFav = NT.storage.isInFavorites(id);
          favBtn.innerHTML = (inFav ? NT.components.Icons.heartFill : NT.components.Icons.heart) + ' ' + (inFav ? 'Favourited' : 'Add to Favourites');
          favBtn.classList.toggle('btn-secondary', inFav);
        }
        renderWatchlistBtn();
        renderFavBtn();
        wlBtn.addEventListener('click', () => {
          if (NT.storage.isInWatchlist(id)) {
            NT.storage.removeFromWatchlist(id);
            NT.components.Toast('Removed from watchlist', 'info');
          } else {
            NT.storage.addToWatchlist({
              malId: id, title: anime.title,
              posterUrl: anime.images?.jpg?.large_image_url, score: anime.score
            });
            NT.components.Toast('Added to watchlist!', 'success');
          }
          renderWatchlistBtn();
        });
        favBtn.addEventListener('click', () => {
          if (NT.storage.isInFavorites(id)) {
            NT.storage.removeFromFavorites(id);
            NT.components.Toast('Removed from favourites', 'info');
          } else {
            NT.storage.addToFavorites({
              malId: id, title: anime.title,
              posterUrl: anime.images?.jpg?.large_image_url, score: anime.score
            });
            NT.components.Toast('Added to favourites!', 'success');
          }
          renderFavBtn();
        });

        // User rating
        const ratingWrap = document.getElementById('userRating');
        const initialRating = NT.storage.getUserRating(id);
        const stars = NT.components.RatingStars(initialRating, (newVal) => {
          NT.storage.setUserRating(id, newVal);
          NT.components.Toast(newVal ? `You rated this ${newVal}/10` : 'Rating cleared', 'success', 1500);
        });
        ratingWrap.appendChild(stars);

        // Characters
        const chars = (charsRes.data || []).slice(0, 18);
        const charWrap = document.getElementById('characters');
        if (chars.length === 0) charWrap.innerHTML = '<p class="text-soft">No character data available.</p>';
        else chars.forEach(c => {
          const va = c.voice_actors?.find(v => v.language === 'Japanese') || c.voice_actors?.[0];
          const card = document.createElement('div');
          card.className = 'character-card';
          card.innerHTML = `
            <img src="${c.character.images?.jpg?.image_url || ''}" alt="${c.character.name}" loading="lazy" />
            <div class="info">
              <div class="name" title="${c.character.name}">${c.character.name}</div>
              <div class="role">${c.role}</div>
              ${va ? `<div class="va" title="${va.person.name}">${va.person.name}</div>` : ''}
            </div>
          `;
          charWrap.appendChild(card);
        });

        // Staff
        const staff = (staffRes.data || []).slice(0, 12);
        const staffWrap = document.getElementById('staff');
        if (staff.length === 0) staffWrap.innerHTML = '<p class="text-soft">No staff data available.</p>';
        else staff.forEach(s => {
          const card = document.createElement('div');
          card.className = 'staff-card';
          const initial = (s.person.name || '?').charAt(0);
          card.innerHTML = `
            <div class="avatar">${initial}</div>
            <div class="name" title="${s.person.name}">${s.person.name}</div>
            <div class="role">${(s.positions || []).join(', ')}</div>
          `;
          staffWrap.appendChild(card);
        });

        // Recommendations
        const recs = (recsRes.data || []).map(r => r.entry).filter(Boolean).slice(0, 6);
        const recGrid = document.getElementById('recommendations');
        if (recs.length === 0) recGrid.innerHTML = '<p class="text-soft" style="grid-column:1/-1">No recommendations yet.</p>';
        else recs.forEach((a, i) => {
          const c = NT.components.AnimeCard(a, { size: 'md' });
          c.style.animation = `fadeUp 500ms ${i * 30}ms ease both`;
          recGrid.appendChild(c);
        });

        // Reviews
        const reviews = (reviewsRes.data || []).slice(0, 3);
        const reviewsWrap = document.getElementById('reviews');
        if (reviews.length === 0) reviewsWrap.innerHTML = '<p class="text-soft">No reviews yet.</p>';
        else reviews.forEach(r => {
          const card = document.createElement('div');
          card.className = 'review-card';
          const initial = (r.user?.username || 'A').charAt(0).toUpperCase();
          card.innerHTML = `
            <div class="review-head">
              <div class="avatar">${initial}</div>
              <div class="user">
                <div class="name">${r.user?.username || 'Anonymous'}</div>
                <div class="meta">${NT.utils.Formatters.date(r.date)}</div>
              </div>
              <div class="score">${r.score || '—'}</div>
              <div class="helpful">${NT.components.Icons.heart}<span>${r.reactions?.overall || 0}</span></div>
            </div>
            <div class="review-body collapsed">${r.review || ''}</div>
            <button class="read-more-btn" style="margin-top:var(--space-2);margin-bottom:0">Read more</button>
          `;
          const body = card.querySelector('.review-body');
          const btn = card.querySelector('.read-more-btn');
          btn.addEventListener('click', () => {
            body.classList.toggle('collapsed');
            btn.textContent = body.classList.contains('collapsed') ? 'Read more' : 'Read less';
          });
          reviewsWrap.appendChild(card);
        });

        // Episodes
        const totalEpisodes = anime.episodes || epData.length || 0;
        document.getElementById('epCount').textContent = totalEpisodes > 0 ? `${totalEpisodes} episodes` : 'Unknown';
        renderEpisodes();

        // Language toggle
        document.querySelectorAll('.lang-toggle button').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLang = btn.dataset.lang;
          });
        });

      } catch (e) {
        console.error('Anime page error', e);
        document.getElementById('main-content').innerHTML = `
          <div class="empty-state">
            <h3>Failed to load anime</h3>
            <p>${e.message || 'Network error'}</p>
            <a class="btn btn-primary" href="home.html">Back to Home</a>
          </div>
        `;
      }

      function renderEpisodes() {
        const epGrid = document.getElementById('epGrid');
        const epPagination = document.getElementById('epPagination');
        epGrid.innerHTML = '';
        epPagination.innerHTML = '';
        const watched = NT.storage.getWatchedEpisodes(id);

        // Build episode list — combine Jikan episodes with synthetic numbers if needed
        let episodes = epData;
        if (episodes.length === 0) {
          // Generate from anime.episodes count
          const total = parseInt(document.getElementById('epCount').textContent) || 0;
          episodes = Array.from({ length: total }, (_, i) => ({ mal_id: i + 1, title: null, episode: i + 1 }));
        }
        epTotalPages = Math.max(1, Math.ceil(episodes.length / EP_PER_PAGE));
        const start = (epPage - 1) * EP_PER_PAGE;
        const slice = episodes.slice(start, start + EP_PER_PAGE);

        if (slice.length === 0) {
          epGrid.innerHTML = '<p class="text-soft" style="grid-column:1/-1">No episodes listed yet.</p>';
          return;
        }
        slice.forEach(ep => {
          const num = ep.mal_id || ep.episode;
          const isWatched = watched.includes(num);
          const card = document.createElement('a');
          card.className = `ep-card ${isWatched ? 'watched' : ''}`;
          card.href = `watch.html?id=${id}&ep=${num}&lang=${currentLang}`;
          card.innerHTML = `
            <div class="num">${isWatched ? '✓' : num}</div>
            <div class="info">
              <div class="t">Episode ${num}${ep.title ? ': ' + ep.title : ''}</div>
              <div class="d">Aired ${ep.aired ? NT.utils.Formatters.date(ep.aired) : '—'}</div>
            </div>
            <div class="play-icon">${NT.components.Icons.play}</div>
          `;
          epGrid.appendChild(card);
        });

        if (epTotalPages > 1) {
          const prev = document.createElement('button');
          prev.textContent = '←';
          prev.disabled = epPage === 1;
          prev.addEventListener('click', () => { epPage = Math.max(1, epPage - 1); renderEpisodes(); });
          epPagination.appendChild(prev);

          for (let i = 1; i <= epTotalPages; i++) {
            const b = document.createElement('button');
            b.textContent = i;
            if (i === epPage) b.classList.add('active');
            b.addEventListener('click', () => { epPage = i; renderEpisodes(); });
            epPagination.appendChild(b);
          }

          const next = document.createElement('button');
          next.textContent = '→';
          next.disabled = epPage === epTotalPages;
          next.addEventListener('click', () => { epPage = Math.min(epTotalPages, epPage + 1); renderEpisodes(); });
          epPagination.appendChild(next);
        }
      }

      NT.utils.setupReveal();
    });
  </script>
</body>
</html>
