<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Details - NamiTube</title>
  <meta name="description" content="Anime details, episodes, and streaming on NamiTube.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="preconnect" href="https://api.jikan.moe">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .anime-hero {
      position: relative;
      height: 400px;
      overflow: hidden;
    }
    .anime-hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center 20%;
      filter: blur(20px) brightness(0.4);
    }
    .anime-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--bg-primary) 0%, transparent 100%);
    }
    .anime-hero-content {
      position: relative;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 80px 24px 0;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
      transition: color var(--transition-fast);
    }
    .back-btn:hover {
      color: var(--text-primary);
    }
    .anime-info-grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 40px;
      max-width: var(--max-width);
      margin: -60px auto 0;
      padding: 0 24px 40px;
      position: relative;
      z-index: 10;
    }
    .anime-poster-wrap {
      position: sticky;
      top: calc(var(--header-height) + 24px);
      align-self: start;
    }
    .anime-poster {
      width: 100%;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      aspect-ratio: 2/3;
      object-fit: cover;
    }
    .anime-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }
    .anime-details h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .anime-subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .anime-meta-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .anime-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .anime-meta-item.score {
      color: #f5c518;
      font-weight: 600;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px 24px;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .info-label {
      color: var(--text-muted);
    }
    .info-value {
      color: var(--text-primary);
      font-weight: 500;
    }
    .synopsis {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
    .synopsis.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .read-more {
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .genres-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .episode-section {
      margin-top: 40px;
    }
    .episode-tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .episode-tab {
      padding: 12px 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      transition: all var(--transition-fast);
      background: none;
    }
    .episode-tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
    }
    .episode-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .episode-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--transition-fast);
      align-items: center;
    }
    .episode-card:hover {
      border-color: var(--text-muted);
      background: var(--bg-elevated);
    }
    .episode-card.watched {
      opacity: 0.6;
    }
    .episode-card.current {
      border-color: var(--accent);
    }
    .episode-num {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .episode-info {
      flex: 1;
      min-width: 0;
    }
    .episode-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .episode-date {
      font-size: 12px;
      color: var(--text-muted);
    }
    .episode-check {
      color: var(--success);
      flex-shrink: 0;
    }
    .trailer-container {
      position: relative;
      padding-bottom: 56.25%;
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 40px;
      background: var(--bg-card);
    }
    .trailer-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    @media (max-width: 1023px) {
      .anime-info-grid {
        grid-template-columns: 1fr;
      }
      .anime-poster-wrap {
        position: relative;
        top: 0;
        max-width: 250px;
        margin: 0 auto;
      }
      .anime-hero {
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <main id="main-content" style="padding-top: var(--header-height);">
    <div class="anime-hero" id="animeHero">
      <div class="anime-hero-bg" id="heroBg"></div>
      <div class="anime-hero-overlay"></div>
      <div class="anime-hero-content">
        <a href="home.html" class="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </a>
      </div>
    </div>

    <div class="anime-info-grid" id="animeInfo">
      <div class="anime-poster-wrap">
        <div class="skeleton" style="aspect-ratio: 2/3; border-radius: 8px;" id="posterSkeleton"></div>
        <div class="anime-actions" id="animeActions" style="display: none;">
          <a href="#" class="btn btn-primary btn-full" id="watchBtn">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><polygon points="5 3 19 12 5 21 5 3"/></svg> Watch Now
          </a>
          <button class="btn btn-outline btn-full" id="watchlistBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Add to Watchlist
          </button>
          <button class="btn btn-outline btn-full" id="favoriteBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Add to Favorites
          </button>
          <button class="btn btn-ghost btn-full" id="shareBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share
          </button>
        </div>
      </div>

      <div class="anime-details" id="animeDetails">
        <div class="skeleton" style="height: 40px; width: 70%; margin-bottom: 12px;"></div>
        <div class="skeleton" style="height: 20px; width: 50%; margin-bottom: 20px;"></div>
        <div class="skeleton" style="height: 100px; margin-bottom: 20px;"></div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>
  <script>
    const AnimePage = {
      anime: null,
      episodes: [],
      currentLang: 'sub',

      async init() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) {
          window.location.href = 'home.html';
          return;
        }
        try {
          const [animeData, episodesData] = await Promise.all([
            JikanAPI.getAnime(id),
            JikanAPI.getAnimeEpisodes(id)
          ]);
          this.anime = animeData.data;
          this.episodes = episodesData.data || [];
          this.render();
        } catch (e) {
          App.showToast('Failed to load anime details', 'error');
          console.error(e);
        }
      },

      render() {
        const anime = this.anime;
        if (!anime) return;
        const banner = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
        document.getElementById('heroBg').style.backgroundImage = `url('${banner}')`;
        const posterUrl = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
        document.getElementById('posterSkeleton').outerHTML = `
          <img src="${posterUrl}" alt="${escapeHtml(anime.title_english || anime.title)}" class="anime-poster" id="animePoster">
        `;
        document.getElementById('animeActions').style.display = 'flex';
        document.getElementById('watchBtn').href = `watch.html?id=${anime.mal_id}&ep=1&lang=sub`;
        const isFav = Storage.isFavorite(anime.mal_id);
        document.getElementById('favoriteBtn').innerHTML = `<svg viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${isFav ? 'Favorited' : 'Add to Favorites'}`;
        document.getElementById('favoriteBtn').onclick = () => {
          Storage.toggleFavorite(anime);
          this.render();
        };
        document.getElementById('watchlistBtn').onclick = () => {
          Storage.addToWatchlist(anime, 'watching');
        };
        document.getElementById('shareBtn').onclick = () => {
          navigator.clipboard.writeText(window.location.href);
          App.showToast('Link copied to clipboard', 'success');
        };

        const detailsHTML = `
          <h1>${escapeHtml(anime.title_english || anime.title)}</h1>
          <div class="anime-subtitle">${escapeHtml(anime.title_japanese || '')}</div>
          <div class="anime-meta-row">
            <span class="anime-meta-item score"><svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> ${anime.score || 'N/A'}</span>
            <span class="anime-meta-item">Rank #${anime.rank || 'N/A'}</span>
            <span class="anime-meta-item">Popularity #${anime.popularity || 'N/A'}</span>
            <span class="anime-meta-item">${App.formatNumber(anime.members)} Members</span>
          </div>
          <div class="info-grid">
            <div class="info-item"><span class="info-label">Type</span><span class="info-value">${anime.type || 'Unknown'}</span></div>
            <div class="info-item"><span class="info-label">Episodes</span><span class="info-value">${anime.episodes || 'Unknown'}</span></div>
            <div class="info-item"><span class="info-label">Status</span><span class="info-value">${anime.status || 'Unknown'}</span></div>
            <div class="info-item"><span class="info-label">Aired</span><span class="info-value">${anime.aired?.string || 'Unknown'}</span></div>
            <div class="info-item"><span class="info-label">Season</span><span class="info-value">${anime.season ? anime.season + ' ' + anime.year : 'Unknown'}</span></div>
            <div class="info-item"><span class="info-label">Duration</span><span class="info-value">${anime.duration || 'Unknown'}</span></div>
            <div class="info-item"><span class="info-label">Studio</span><span class="info-value">${anime.studios?.[0]?.name || 'Unknown'}</span></div>
            <div class="info-item"><span class="info-label">Source</span><span class="info-value">${anime.source || 'Unknown'}</span></div>
            <div class="info-item"><span class="info-label">Rating</span><span class="info-value">${anime.rating || 'Unknown'}</span></div>
          </div>
          <div class="genres-list">
            ${(anime.genres || []).map(g => `<a href="search.html?genre=${g.mal_id}" class="pill">${escapeHtml(g.name)}</a>`).join('')}
          </div>
          <div class="synopsis collapsed" id="synopsis">${escapeHtml(anime.synopsis || 'No synopsis available.')}</div>
          ${(anime.synopsis || '').length > 300 ? `<button class="read-more" onclick="document.getElementById('synopsis').classList.toggle('collapsed'); this.textContent = document.getElementById('synopsis').classList.contains('collapsed') ? 'Read More' : 'Show Less'">Read More</button>` : ''}
          ${anime.trailer?.embed_url ? `
            <div class="episode-section">
              <h3 style="font-size: 20px; font-weight: 700; margin-bottom: 16px;">Trailer</h3>
              <div class="trailer-container">
                <iframe src="${anime.trailer.embed_url}" allowfullscreen title="Trailer"></iframe>
              </div>
            </div>
          ` : ''}
          <div class="episode-section">
            <div class="episode-tabs">
              <button class="episode-tab active" onclick="AnimePage.switchLang('sub')">Sub</button>
              <button class="episode-tab" onclick="AnimePage.switchLang('dub')">Dub</button>
            </div>
            <div class="episode-list" id="episodeList"></div>
          </div>
        `;
        document.getElementById('animeDetails').innerHTML = detailsHTML;
        this.renderEpisodes();
      },

      switchLang(lang) {
        this.currentLang = lang;
        document.querySelectorAll('.episode-tab').forEach((tab, i) => {
          tab.classList.toggle('active', (lang === 'sub' && i === 0) || (lang === 'dub' && i === 1));
        });
        this.renderEpisodes();
      },

      renderEpisodes() {
        const list = document.getElementById('episodeList');
        const history = Storage.getHistory();
        if (!this.episodes.length) {
          const count = this.anime.episodes || 12;
          this.episodes = Array.from({ length: count }, (_, i) => ({
            mal_id: this.anime.mal_id,
            episode: i + 1,
            title: `Episode ${i + 1}`,
            aired: ''
          }));
        }
        list.innerHTML = this.episodes.map((ep, i) => {
          const isWatched = history.some(h => h.malId === this.anime.mal_id && h.episode === ep.episode);
          const isCurrent = i === 0 && !isWatched;
          return `
            <div class="episode-card ${isWatched ? 'watched' : ''} ${isCurrent ? 'current' : ''}" 
                 onclick="window.location.href='watch.html?id=${this.anime.mal_id}&ep=${ep.episode}&lang=${this.currentLang}'">
              <div class="episode-num">${ep.episode}</div>
              <div class="episode-info">
                <div class="episode-title">${escapeHtml(ep.title || `Episode ${ep.episode}`)}</div>
                <div class="episode-date">${ep.aired ? App.formatDate(ep.aired) : ''}</div>
              </div>
              ${isWatched ? `<span class="episode-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><polyline points="20 6 9 17 4 12"/></svg></span>` : ''}
            </div>
          `;
        }).join('');
      }
    };
    document.addEventListener('DOMContentLoaded', () => AnimePage.init());
  </script>
</body>
</html>
