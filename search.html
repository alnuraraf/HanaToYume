<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — NamiTube</title>
  <meta name="description" content="Search and filter anime on NamiTube.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/search.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="search-page">
  <div id="header-root"></div>

  <main id="main" class="container">
    <div class="search-hero reveal">
      <h1>Find Your Next Anime</h1>
      <div class="search-input-wrap">
        <i data-lucide="search"></i>
        <input type="text" id="search-input" placeholder="Search by title..." autocomplete="off" autofocus>
      </div>
      <div class="recent-searches" id="recent-searches"></div>
    </div>

    <button class="btn btn-secondary mobile-filter-toggle" onclick="toggleFilters()">
      <i data-lucide="sliders-horizontal"></i> Filters
    </button>

    <div class="search-layout">
      <aside class="filters-panel reveal" id="filters-panel" role="complementary">
        <div class="filter-group">
          <label>Type</label>
          <div class="filter-options">
            <label class="filter-checkbox"><input type="checkbox" value="tv" class="ftype"> TV</label>
            <label class="filter-checkbox"><input type="checkbox" value="movie" class="ftype"> Movie</label>
            <label class="filter-checkbox"><input type="checkbox" value="ova" class="ftype"> OVA</label>
            <label class="filter-checkbox"><input type="checkbox" value="ona" class="ftype"> ONA</label>
            <label class="filter-checkbox"><input type="checkbox" value="special" class="ftype"> Special</label>
          </div>
        </div>
        <div class="filter-group">
          <label>Status</label>
          <div class="filter-options">
            <label class="filter-checkbox"><input type="checkbox" value="airing" class="fstatus"> Airing</label>
            <label class="filter-checkbox"><input type="checkbox" value="complete" class="fstatus"> Completed</label>
            <label class="filter-checkbox"><input type="checkbox" value="upcoming" class="fstatus"> Upcoming</label>
          </div>
        </div>
        <div class="filter-group">
          <label>Min Score: <span id="score-val">0</span></label>
          <input type="range" min="0" max="10" step="0.5" value="0" class="range-slider" id="score-slider">
        </div>
        <div class="filter-group">
          <label>Order By</label>
          <select id="order-by" style="width:100%;padding:8px;background:var(--color-bg-primary);border:1px solid var(--color-border);border-radius:var(--radius-sm);color:var(--color-text-primary);">
            <option value="">Relevance</option>
            <option value="score">Score</option>
            <option value="popularity">Popularity</option>
            <option value="members">Members</option>
          </select>
        </div>
        <button class="btn btn-primary btn-sm" style="width:100%;margin-top:8px" onclick="applyFilters()">Apply Filters</button>
      </aside>

      <div class="filter-drawer" id="filter-drawer">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
          <h2 style="font-size:1.25rem">Filters</h2>
          <button class="icon-btn" onclick="toggleFilters()"><i data-lucide="x"></i></button>
        </div>
        <div id="drawer-filters"></div>
      </div>

      <div>
        <div class="results-header reveal">
          <span class="results-count" id="results-count">Start typing to search</span>
        </div>
        <div class="anime-grid" id="results-grid"></div>
        <div class="loading-state" id="load-more" style="display:none;padding:24px"><div class="spinner"></div></div>
      </div>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/components.js"></script>
  <script>
    const params = getUrlParams();
    let query = params.q || '';
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;
    let activeFilters = { type: [], status: [], score: 0, order: '' };

    function getRecent() {
      try { return JSON.parse(localStorage.getItem('namitube_recent_searches') || '[]'); } catch { return []; }
    }
    function saveRecent(q) {
      if (!q) return;
      let r = getRecent().filter(x => x.toLowerCase() !== q.toLowerCase());
      r.unshift(q);
      if (r.length > 8) r = r.slice(0, 8);
      localStorage.setItem('namitube_recent_searches', JSON.stringify(r));
    }
    function renderRecent() {
      const r = getRecent();
      const el = document.getElementById('recent-searches');
      if (!r.length) { el.innerHTML = ''; return; }
      el.innerHTML = r.map(q => `<button class="recent-pill" onclick="setQuery('${escapeHtml(q).replace(/'/g,"\'")}')">${escapeHtml(q)}</button>`).join('');
    }

    window.setQuery = function(q) {
      document.getElementById('search-input').value = q;
      query = q;
      currentPage = 1;
      hasMore = true;
      saveRecent(q);
      renderRecent();
      doSearch();
    };

    const searchInput = document.getElementById('search-input');
    if (query) searchInput.value = query;

    searchInput.addEventListener('input', debounce(() => {
      query = searchInput.value.trim();
      currentPage = 1;
      hasMore = true;
      if (query) { saveRecent(query); renderRecent(); }
      doSearch();
    }, 400));

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        query = searchInput.value.trim();
        if (query) { saveRecent(query); renderRecent(); doSearch(); }
      }
    });

    async function doSearch() {
      const grid = document.getElementById('results-grid');
      const countEl = document.getElementById('results-count');
      const loader = document.getElementById('load-more');
      if (currentPage === 1) grid.innerHTML = SkeletonGrid(12);
      if (!query) {
        grid.innerHTML = '';
        countEl.textContent = 'Start typing to search';
        loader.style.display = 'none';
        return;
      }
      isLoading = true;
      loader.style.display = 'flex';
      try {
        let filterParams = `&limit=24`;
        if (activeFilters.type.length) filterParams += `&type=${activeFilters.type.join(',')}`;
        if (activeFilters.status.length) filterParams += `&status=${activeFilters.status.join(',')}`;
        if (activeFilters.score) filterParams += `&min_score=${activeFilters.score}`;
        if (activeFilters.order) filterParams += `&order_by=${activeFilters.order}&sort=desc`;
        const res = await Jikan.search(query, currentPage, filterParams);
        const items = res.data || [];
        const pagination = res.pagination || {};
        hasMore = pagination.has_next_page || false;
        if (currentPage === 1) grid.innerHTML = '';
        if (!items.length && currentPage === 1) {
          grid.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:48px">
              <p class="text-secondary">No results for "${escapeHtml(query)}"</p>
              <p class="text-muted" style="margin-top:8px">Try a different title or check your spelling.</p>
            </div>
          `;
        } else {
          grid.insertAdjacentHTML('beforeend', items.map(a => AnimeCard(a, {size:'md'})).join(''));
        }
        countEl.textContent = `Showing ${pagination.items?.count || items.length} results for "${escapeHtml(query)}"`;
        if (window.lucide) lucide.createIcons();
        setupLazyImages();
      } catch (e) {
        if (currentPage === 1) grid.innerHTML = '<p class="text-secondary" style="grid-column:1/-1">Search failed. Please try again.</p>';
      } finally {
        isLoading = false;
        loader.style.display = 'none';
      }
    }

    function applyFilters() {
      activeFilters.type = Array.from(document.querySelectorAll('.ftype:checked')).map(c => c.value);
      activeFilters.status = Array.from(document.querySelectorAll('.fstatus:checked')).map(c => c.value);
      activeFilters.score = document.getElementById('score-slider').value;
      activeFilters.order = document.getElementById('order-by').value;
      currentPage = 1;
      hasMore = true;
      doSearch();
    }

    document.getElementById('score-slider').addEventListener('input', (e) => {
      document.getElementById('score-val').textContent = e.target.value;
    });

    window.toggleFilters = function() {
      document.getElementById('filter-drawer').classList.toggle('active');
    };

    window.addEventListener('scroll', () => {
      if (isLoading || !hasMore || !query) return;
      const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
      if (scrollTop + clientHeight >= scrollHeight - 800) {
        currentPage++;
        doSearch();
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      initCommon('search');
      renderRecent();
      if (query) doSearch();
    });
  </script>
</body>
</html>
