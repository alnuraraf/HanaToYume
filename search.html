<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search — NamiTube</title>
<meta name="description" content="Search and filter through thousands of anime titles on NamiTube."/>
<link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/reset.css"/>
<link rel="stylesheet" href="css/variables.css"/>
<link rel="stylesheet" href="css/animations.css"/>
<link rel="stylesheet" href="css/global.css"/>
<link rel="stylesheet" href="css/search.css"/>
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<div id="header-placeholder"></div>

<main id="main" role="main">
  <div class="container">
    <section class="search-hero">
      <h1>Discover Anime</h1>
      <div class="big-search">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="searchInput" placeholder="Search by title... (e.g. 'Naruto', 'Attack on Titan')" autocomplete="off" aria-label="Search anime"/>
      </div>
      <div class="recent-pills" id="recentPills"></div>
    </section>

    <div class="search-layout">
      <aside class="search-sidebar" id="searchSidebar" role="complementary" aria-label="Filters">
        <div class="filter-group">
          <h3>Type</h3>
          <select id="fType">
            <option value="">Any</option>
            <option value="tv">TV</option>
            <option value="movie">Movie</option>
            <option value="ova">OVA</option>
            <option value="ona">ONA</option>
            <option value="special">Special</option>
          </select>
        </div>
        <div class="filter-group">
          <h3>Status</h3>
          <select id="fStatus">
            <option value="">Any</option>
            <option value="airing">Airing</option>
            <option value="complete">Completed</option>
            <option value="upcoming">Upcoming</option>
          </select>
        </div>
        <div class="filter-group">
          <h3>Min Score <span class="slider-val" id="scoreVal">0+</span></h3>
          <input type="range" id="fScore" min="0" max="10" step="1" value="0"/>
        </div>
        <div class="filter-group">
          <h3>Year</h3>
          <input type="number" id="fYear" placeholder="e.g. 2024" min="1960" max="2030"/>
        </div>
        <div class="filter-group">
          <h3>Order By</h3>
          <select id="fOrder">
            <option value="score">Score</option>
            <option value="popularity">Popularity</option>
            <option value="title">Title</option>
            <option value="episodes">Episodes</option>
          </select>
        </div>
        <div class="filter-group">
          <h3>Genres</h3>
          <div id="genreList" style="max-height:240px;overflow-y:auto;"></div>
        </div>
      </aside>

      <section>
        <div class="search-results-info">
          <span class="count" id="resultCount"></span>
          <button class="btn btn-secondary btn-sm filter-toggle" id="filterToggle">
            <i data-lucide="sliders-horizontal"></i>Filters
          </button>
        </div>
        <div class="anime-grid" id="searchGrid"></div>
      </section>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://unpkg.com/lucide@latest"></script>
<script defer src="js/utils.js"></script>
<script defer src="js/api.js"></script>
<script defer src="js/storage.js"></script>
<script defer src="js/components.js"></script>
<script defer src="js/search.js"></script>
</body>
</html>
