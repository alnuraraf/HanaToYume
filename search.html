<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — NamiTube Infinity</title>
  <meta name="description" content="Search and filter anime on NamiTube. Find your next favorite series.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <link rel="stylesheet" href="css/search.css">
</head>
<body>
  <header class="site-header" id="site-header" role="banner"></header>
  <div class="search-overlay" id="search-overlay">
    <div class="nt-container">
      <input type="text" placeholder="Search anime..." id="search-overlay-input" onkeydown="if(event.key==='Enter')window.location.href='search.html?q='+encodeURIComponent(this.value)">
    </div>
  </div>
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="mobile-drawer" id="mobile-drawer">
    <div class="drawer-nav" id="drawer-nav"></div>
  </div>
  <div class="rate-limit-banner" id="rate-limit-banner"></div>
  <div class="private-banner" id="private-banner">Personalisation features are unavailable in this browser mode.</div>

  <main id="main-content">
    <div class="search-bar-wrap">
      <input type="text" class="search-bar" id="search-input" placeholder="Search anime, movies, OVAs..." autocomplete="off">
    </div>
    <div class="recent-searches" id="recent-searches"></div>
    <div class="search-layout">
      <aside class="filter-sidebar" id="filter-panel">
        <div class="filter-group">
          <label>Type</label>
          <div class="filter-options">
            <label class="filter-radio"><input type="radio" name="type" value=""> All</label>
            <label class="filter-radio"><input type="radio" name="type" value="tv"> TV</label>
            <label class="filter-radio"><input type="radio" name="type" value="movie"> Movie</label>
            <label class="filter-radio"><input type="radio" name="type" value="ova"> OVA</label>
            <label class="filter-radio"><input type="radio" name="type" value="ona"> ONA</label>
            <label class="filter-radio"><input type="radio" name="type" value="special"> Special</label>
          </div>
        </div>
        <div class="filter-group">
          <label>Status</label>
          <div class="filter-options">
            <label class="filter-radio"><input type="radio" name="status" value=""> All</label>
            <label class="filter-radio"><input type="radio" name="status" value="airing"> Airing</label>
            <label class="filter-radio"><input type="radio" name="status" value="completed"> Completed</label>
            <label class="filter-radio"><input type="radio" name="status" value="upcoming"> Upcoming</label>
          </div>
        </div>
        <div class="filter-group">
          <label>Rating</label>
          <div class="filter-options">
            <label class="filter-radio"><input type="radio" name="rating" value=""> All</label>
            <label class="filter-radio"><input type="radio" name="rating" value="g"> G</label>
            <label class="filter-radio"><input type="radio" name="rating" value="pg"> PG</label>
            <label class="filter-radio"><input type="radio" name="rating" value="pg13"> PG-13</label>
            <label class="filter-radio"><input type="radio" name="rating" value="r17"> R</label>
          </div>
        </div>
        <div class="filter-group">
          <label>Min Score</label>
          <input type="range" class="filter-range" id="min-score" min="1" max="10" step="0.5" value="1">
          <div class="range-value" id="score-value">1</div>
        </div>
        <div class="filter-group">
          <label>Order By</label>
          <select class="filter-select" id="order-by">
            <option value="popularity">Popularity</option>
            <option value="score">Score</option>
            <option value="title">Title</option>
            <option value="episodes">Episodes</option>
            <option value="rank">Rank</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Sort</label>
          <select class="filter-select" id="sort">
            <option value="desc">Descending</option>
            <option value="asc">Ascending</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Year</label>
          <input type="number" class="filter-select" id="year" placeholder="e.g. 2024" min="1960" max="2030">
        </div>
        <div class="filter-group">
          <label>Season</label>
          <select class="filter-select" id="season">
            <option value="">Any</option>
            <option value="spring">Spring</option>
            <option value="summer">Summer</option>
            <option value="fall">Fall</option>
            <option value="winter">Winter</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Genres</label>
          <div class="filter-options" id="genre-filters"></div>
        </div>
        <button class="nt-btn nt-btn-primary" id="apply-filters" style="width:100%;margin-top:8px;">Apply Filters</button>
        <button class="nt-btn nt-btn-secondary" id="reset-filters" style="width:100%;margin-top:8px;">Reset All</button>
      </aside>
      <div class="results-area">
        <div class="results-header" id="results-header">Browsing all anime</div>
        <div class="results-grid" id="search-results"></div>
      </div>
    </div>
    <button class="filter-toggle-btn" id="filter-toggle">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg> Filters
    </button>
  </main>

  <footer class="site-footer" id="site-footer" role="contentinfo"></footer>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module">
    import { renderHeader, renderFooter, initHeaderInteractions } from './js/components.js';
    import { initSearch } from './js/search.js';
    import { isPrivateMode, showPrivateBanner, setupIntersectionReveal } from './js/utils.js';

    document.getElementById('site-header').innerHTML = renderHeader('search');
    document.getElementById('site-footer').innerHTML = renderFooter();
    initHeaderInteractions();
    if (isPrivateMode()) showPrivateBanner();

    const drawerNav = document.getElementById('drawer-nav');
    if (drawerNav) {
      drawerNav.innerHTML = `
        <a href="home.html">Home</a>
        <a href="discover.html">Discover</a>
        <a href="search.html" class="active">Search</a>
        <a href="schedule.html">Schedule</a>
        <a href="spotlight.html">Spotlight</a>
        <a href="library.html">Library</a>
        <a href="donate.html">Donate</a>
        <hr style="border:none;border-top:1px solid var(--nt-border);margin:12px 0;">
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      `;
    }

    document.getElementById('min-score')?.addEventListener('input', (e) => {
      document.getElementById('score-value').textContent = e.target.value;
    });

    initSearch();
    setupIntersectionReveal();
    lucide.createIcons();
  </script>
</body>
</html>
