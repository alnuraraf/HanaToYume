<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — NamiTube Infinity</title>
  <meta name="description" content="Browse trending anime, seasonal releases, top rated series and more on NamiTube.">
  <meta property="og:title" content="Home — NamiTube Infinity">
  <meta property="og:description" content="Browse trending anime, seasonal releases, top rated series and more.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <header class="site-header" id="site-header" role="banner"></header>
  <div class="search-overlay" id="search-overlay">
    <div class="nt-container">
      <input type="text" placeholder="Search anime..." id="search-overlay-input" onkeydown="if(event.key==='Enter')window.location.href='search.html?q='+encodeURIComponent(this.value)">
    </div>
  </div>
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="mobile-drawer" id="mobile-drawer">
    <div class="drawer-nav" id="drawer-nav"></div>
  </div>
  <div class="rate-limit-banner" id="rate-limit-banner"></div>
  <div class="private-banner" id="private-banner">Personalisation features are unavailable in this browser mode.</div>

  <main id="main-content">
    <section class="home-hero" id="home-hero">
      <div class="hero-bg" id="hero-bg" style="background-image:none"></div>
      <div class="hero-overlay" id="hero-overlay"></div>
      <div class="hero-dots" id="hero-dots"></div>
    </section>

    <section class="nt-container">
      <div class="genre-tabs" id="genre-tabs"></div>
    </section>

    <section class="nt-container">
      <div class="section-header"><h2 class="section-title">New Episodes Today</h2></div>
      <div class="scroll-row" id="row-new"></div>
    </section>

    <section class="nt-container">
      <div class="section-header"><h2 class="section-title">Trending This Week</h2></div>
      <div class="scroll-row" id="row-trending"></div>
    </section>

    <section class="nt-container">
      <div class="section-header"><h2 class="section-title">This Season</h2></div>
      <div class="scroll-row" id="row-season"></div>
    </section>

    <section class="nt-container">
      <div class="section-header"><h2 class="section-title">Top Rated All Time</h2></div>
      <div class="scroll-row" id="row-top"></div>
    </section>

    <section class="nt-container">
      <div class="section-header"><h2 class="section-title">Popular Movies</h2></div>
      <div class="scroll-row" id="row-movies"></div>
    </section>

    <section class="nt-container">
      <div class="section-header"><h2 class="section-title">Coming Soon</h2></div>
      <div class="scroll-row" id="row-upcoming"></div>
    </section>

    <section class="nt-container" style="padding-bottom:48px;">
      <div class="section-header"><h2 class="section-title">Browse All Anime</h2></div>
      <div class="browse-grid" id="browse-grid"></div>
      <button class="load-more-btn" id="load-more">Load More</button>
    </section>
  </main>

  <footer class="site-footer" id="site-footer" role="contentinfo"></footer>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module">
    import { renderHeader, renderFooter, AnimeCard, SkeletonCard, SkeletonRow, initHeaderInteractions } from './js/components.js';
    import { jikan } from './js/api.js';
    import { setupIntersectionReveal, setupLazyImages, isPrivateMode, showPrivateBanner } from './js/utils.js';

    document.getElementById('site-header').innerHTML = renderHeader('home');
    document.getElementById('site-footer').innerHTML = renderFooter();
    initHeaderInteractions();
    if (isPrivateMode()) showPrivateBanner();

    const drawerNav = document.getElementById('drawer-nav');
    if (drawerNav) {
      drawerNav.innerHTML = `
        <a href="home.html" class="active">Home</a>
        <a href="discover.html">Discover</a>
        <a href="search.html">Search</a>
        <a href="schedule.html">Schedule</a>
        <a href="spotlight.html">Spotlight</a>
        <a href="library.html">Library</a>
        <a href="donate.html">Donate</a>
        <hr style="border:none;border-top:1px solid var(--nt-border);margin:12px 0;">
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      `;
    }

    let heroAnime = [];
    let heroIndex = 0;
    let heroInterval;
    let browsePage = 1;
    let currentGenre = null;

    async function loadGenres() {
      try {
        const data = await jikan('/genres/anime');
        const genres = (data?.data || []).slice(0, 18);
        const tabs = document.getElementById('genre-tabs');
        if (tabs) {
          tabs.innerHTML = `<button class="genre-tab active" data-id="">All</button>` +
            genres.map(g => `<button class="genre-tab" data-id="${g.mal_id}">${g.name}</button>`).join('');
          tabs.querySelectorAll('.genre-tab').forEach(btn => {
            btn.addEventListener('click', () => {
              tabs.querySelectorAll('.genre-tab').forEach(b => b.classList.remove('active'));
              btn.classList.add('active');
              currentGenre = btn.dataset.id || null;
              browsePage = 1;
              document.getElementById('browse-grid').innerHTML = '';
              loadBrowse();
            });
          });
        }
      } catch (e) {}
    }

    async function loadHero() {
      try {
        const data = await jikan('/top/anime?filter=airing&page=1');
        heroAnime = (data?.data || []).slice(0, 5);
        renderHero();
        startHeroCycle();
      } catch (e) {}
    }

    function renderHero() {
      const bg = document.getElementById('hero-bg');
      const overlay = document.getElementById('hero-overlay');
      const dots = document.getElementById('hero-dots');
      const item = heroAnime[heroIndex];
      if (!item) return;
      if (bg) bg.style.backgroundImage = `url('${item.images?.jpg?.large_image_url || ''}')`;
      if (overlay) {
        overlay.innerHTML = `
          <img class="hero-poster" src="${item.images?.jpg?.image_url || ''}" alt="${item.title}">
          <div class="hero-info">
            <h1 class="hero-title">${item.title}</h1>
            <p class="hero-synopsis">${(item.synopsis || '').slice(0, 180)}${(item.synopsis || '').length > 180 ? '...' : ''}</p>
            <div class="hero-meta">
              <span class="meta-pill gold">Score ${item.score?.toFixed(1) || 'N/A'}</span>
              <span class="meta-pill">${item.episodes || '?'} Ep</span>
              <span class="meta-pill">${item.status || 'Unknown'}</span>
            </div>
            <div class="hero-actions">
              <a href="watch.html?id=${item.mal_id}&ep=1&lang=sub" class="nt-btn nt-btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Watch Now
              </a>
              <a href="anime.html?id=${item.mal_id}" class="nt-btn nt-btn-secondary">More Info</a>
            </div>
          </div>
        `;
      }
      if (dots) {
        dots.innerHTML = heroAnime.map((_, i) => `
          <button class="hero-dot ${i === heroIndex ? 'active' : ''}" aria-label="Slide ${i+1}"></button>
        `).join('');
        dots.querySelectorAll('.hero-dot').forEach((d, i) => {
          d.addEventListener('click', () => { heroIndex = i; renderHero(); });
        });
      }
    }

    function startHeroCycle() {
      if (heroInterval) clearInterval(heroInterval);
      heroInterval = setInterval(() => { heroIndex = (heroIndex + 1) % heroAnime.length; renderHero(); }, 12000);
    }

    async function loadRow(id, url) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = SkeletonRow(8, 'md');
      try {
        const data = await jikan(url);
        const items = (data?.data || []).slice(0, 8);
        el.innerHTML = items.map(item => AnimeCard(item, { size: 'md' })).join('');
        setupLazyImages();
      } catch (e) { el.innerHTML = '<p class="empty-state">Failed to load.</p>'; }
    }

    async function loadBrowse() {
      const grid = document.getElementById('browse-grid');
      if (!grid) return;
      const url = currentGenre
        ? `/anime?genres=${currentGenre}&order_by=popularity&sort=desc&page=${browsePage}&limit=24`
        : `/top/anime?filter=airing&page=${browsePage}&limit=24`;
      try {
        const data = await jikan(url);
        const items = data?.data || [];
        if (browsePage === 1) grid.innerHTML = '';
        items.forEach(item => {
          const div = document.createElement('div');
          div.innerHTML = AnimeCard(item, { size: 'lg' });
          grid.appendChild(div.firstElementChild);
        });
        setupLazyImages();
      } catch (e) {}
    }

    document.getElementById('load-more')?.addEventListener('click', () => { browsePage++; loadBrowse(); });

    loadHero();
    loadGenres();
    const today = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][new Date().getDay()];
    loadRow('row-new', `/schedules?filter=${today}&page=1`);
    loadRow('row-trending', '/top/anime?filter=airing&page=1');
    loadRow('row-season', '/seasons/now?page=1');
    loadRow('row-top', '/top/anime?filter=bypopularity&page=1');
    loadRow('row-movies', '/top/anime?type=movie&page=1');
    loadRow('row-upcoming', '/top/anime?filter=upcoming&page=1');
    loadBrowse();
    setupIntersectionReveal();
    lucide.createIcons();
  </script>
</body>
</html>
