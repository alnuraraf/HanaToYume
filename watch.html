<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch — NamiTube Infinity</title>
  <meta name="description" content="Watch anime episodes in HD with multiple servers on NamiTube.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <link rel="stylesheet" href="css/watch.css">
</head>
<body>
  <div class="scroll-progress" id="scroll-progress"></div>
  <header class="site-header" id="site-header" role="banner"></header>
  <div class="search-overlay" id="search-overlay">
    <div class="nt-container">
      <input type="text" placeholder="Search anime..." id="search-overlay-input" onkeydown="if(event.key==='Enter')window.location.href='search.html?q='+encodeURIComponent(this.value)">
    </div>
  </div>
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="mobile-drawer" id="mobile-drawer">
    <div class="drawer-nav" id="drawer-nav"></div>
  </div>
  <div class="rate-limit-banner" id="rate-limit-banner"></div>
  <div class="private-banner" id="private-banner">Personalisation features are unavailable in this browser mode.</div>

  <main id="main-content">
    <div class="watch-layout">
      <div class="watch-main">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="player-wrap">
          <iframe id="player-iframe" allowfullscreen allow="autoplay; fullscreen" title="Anime Player"></iframe>
        </div>
        <div class="player-controls">
          <div class="control-row">
            <button class="control-btn active" data-lang="sub" id="lang-sub">Sub</button>
            <button class="control-btn" data-lang="dub" id="lang-dub">Dub</button>
          </div>
          <div class="control-row">
            <button class="control-btn active" data-server="1" id="server-1">Server 1</button>
            <button class="control-btn" data-server="2" id="server-2">Server 2</button>
          </div>
          <div class="control-row">
            <button class="control-btn" id="prev-ep"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg> Previous</button>
            <button class="control-btn" id="next-ep">Next <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
          </div>
        </div>
        <div class="episode-info" id="episode-info"></div>
      </div>
      <aside class="watch-sidebar" role="complementary">
        <div class="sidebar-card" id="sidebar-card"></div>
        <h3 style="font-size:14px;margin-bottom:10px;">Episodes</h3>
        <div class="episode-list" id="episode-list"></div>
        <div style="margin-top:20px;" id="sidebar-recommendations"></div>
      </aside>
    </div>
  </main>

  <footer class="site-footer" id="site-footer" role="contentinfo"></footer>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module">
    import { renderHeader, renderFooter, AnimeCard, initHeaderInteractions } from './js/components.js';
    import { initPlayer, initScrollProgress } from './js/player.js';
    import { jikan } from './js/api.js';
    import { setupIntersectionReveal, setupLazyImages, getParam, setTitle, escapeHtml, isPrivateMode, showPrivateBanner } from './js/utils.js';

    document.getElementById('site-header').innerHTML = renderHeader('');
    document.getElementById('site-footer').innerHTML = renderFooter();
    initHeaderInteractions();
    if (isPrivateMode()) showPrivateBanner();

    const drawerNav = document.getElementById('drawer-nav');
    if (drawerNav) {
      drawerNav.innerHTML = `
        <a href="home.html">Home</a>
        <a href="discover.html">Discover</a>
        <a href="search.html">Search</a>
        <a href="schedule.html">Schedule</a>
        <a href="spotlight.html">Spotlight</a>
        <a href="library.html">Library</a>
        <a href="donate.html">Donate</a>
        <hr style="border:none;border-top:1px solid var(--nt-border);margin:12px 0;">
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      `;
    }

    const id = Number(getParam('id'));
    const ep = Number(getParam('ep')) || 1;
    const lang = getParam('lang') || 'sub';
    if (!id || isNaN(id)) { window.location.replace('home.html'); }

    let animeData = null;
    let episodes = [];

    async function loadWatch() {
      try {
        const [anime, eps] = await Promise.all([
          jikan(`/anime/${id}`),
          jikan(`/anime/${id}/episodes?page=1`)
        ]);
        animeData = anime?.data;
        episodes = eps?.data || [];
        if (!animeData) { window.location.replace('home.html'); return; }

        setTitle(`${animeData.title} — Episode ${ep}`);
        document.querySelector('meta[name="description"]').content = animeData.synopsis || '';

        document.getElementById('breadcrumb').innerHTML = `
          <a href="home.html">Home</a>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          <a href="anime.html?id=${id}">${escapeHtml(animeData.title)}</a>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          <span>Episode ${ep}</span>
        `;

        document.getElementById('sidebar-card').innerHTML = `
          <img src="${animeData.images?.jpg?.image_url || ''}" alt="${animeData.title}">
          <div class="sidebar-card-info">
            <h3>${escapeHtml(animeData.title)}</h3>
            <div class="score">Score ${animeData.score?.toFixed(1) || 'N/A'}</div>
          </div>
        `;

        const epList = document.getElementById('episode-list');
        if (epList) {
          epList.innerHTML = episodes.map(e => {
            const epNum = e.mal_id || e.episode;
            const isCurrent = epNum == ep;
            return `
              <a href="watch.html?id=${id}&ep=${epNum}&lang=${lang}" class="episode-list-item ${isCurrent ? 'current' : ''}">
                <span class="ep-num">${epNum}</span>
                <span class="ep-title">${escapeHtml(e.title || `Episode ${epNum}`)}</span>
              </a>
            `;
          }).join('');
        }

        const currentEpData = episodes.find(e => (e.mal_id || e.episode) == ep);
        document.getElementById('episode-info').innerHTML = `
          <h2>Episode ${ep}${currentEpData?.title ? ` — ${escapeHtml(currentEpData.title)}` : ''}</h2>
          <p>${currentEpData?.synopsis || ''}</p>
        `;

        initPlayer(id, ep, animeData, episodes);
        initScrollProgress();

        // Sidebar recommendations
        try {
          const recs = await jikan(`/anime/${id}/recommendations`);
          const recItems = (recs?.data || []).slice(0, 4);
          const recContainer = document.getElementById('sidebar-recommendations');
          if (recContainer && recItems.length) {
            recContainer.innerHTML = '<h3 style="font-size:14px;margin-bottom:10px;">Recommended</h3>' +
              recItems.map(item => AnimeCard(item.entry, { size: 'sm' })).join('');
            setupLazyImages();
          }
        } catch (e) {}
      } catch (e) {
        document.getElementById('main-content').innerHTML = '<div class="nt-container" style="padding:80px 16px;text-align:center;"><h2>Failed to load episode.</h2><a href="home.html" class="nt-btn nt-btn-primary">Go Home</a></div>';
      }
    }

    loadWatch();
    setupIntersectionReveal();
    lucide.createIcons();
  </script>
</body>
</html>
