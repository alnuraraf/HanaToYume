<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch — NamiTube</title>
  <meta name="description" content="Watch anime episodes in HD on NamiTube.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/watch.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="watch-page">
  <div id="header-root"></div>

  <main id="main" class="container">
    <div class="player-section reveal">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="player-container" id="player-container">
        <iframe id="player-iframe" allowfullscreen></iframe>
      </div>
      <div class="player-controls">
        <div class="server-toggle">
          <button class="active" id="server-1" onclick="switchServer(1)">Server 1 (Primary)</button>
          <button id="server-2" onclick="switchServer(2)">Server 2 (Backup)</button>
        </div>
        <div class="ep-nav">
          <button id="prev-ep" onclick="changeEp(-1)"><i data-lucide="skip-back"></i> Prev</button>
          <button id="next-ep" onclick="changeEp(1)">Next <i data-lucide="skip-forward"></i></button>
        </div>
      </div>
    </div>

    <div class="watch-columns">
      <div class="watch-left">
        <div class="episode-desc reveal" id="episode-desc"></div>
        <div class="reveal" id="episode-strip-wrap"></div>
        <div class="discord-cta reveal">
          <h3>Join the Discussion</h3>
          <p>Share your thoughts and theories with the community.</p>
          <a href="#" class="btn btn-secondary"><i data-lucide="message-circle"></i> Join Discord</a>
        </div>
      </div>
      <aside class="watch-right" role="complementary">
        <div id="sidebar-anime"></div>
        <div id="next-ep-card" class="next-ep-card reveal" style="display:none">
          <div class="next-ep-label">Next Episode In</div>
          <div class="next-ep-timer" id="countdown">--:--:--</div>
        </div>
        <div class="recommendations-sidebar reveal" id="sidebar-recs"></div>
      </aside>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/components.js"></script>
  <script>
    const params = getUrlParams();
    const malId = Number(params.id);
    const currentEp = Number(params.ep) || 1;
    let currentLang = params.lang || getProfile().preferences.defaultLang || 'sub';
    let currentServer = 1;
    let animeData = null;
    let episodeList = [];
    let anilistId = null;

    if (!malId) window.location.href = 'home.html';

    function getPlayerUrl() {
      if (currentServer === 1) {
        return `https://megaplay.buzz/stream/mal/${malId}/${currentEp}/${currentLang}`;
      } else {
        return `https://vidnest.fun/anime/${anilistId || malId}/${currentEp}/${currentLang === 'sub' ? 'sub' : 'dub'}`;
      }
    }

    function updatePlayer() {
      const iframe = document.getElementById('player-iframe');
      iframe.src = getPlayerUrl();
      setUrlParams({ id: malId, ep: currentEp, lang: currentLang }, false);
      document.getElementById('server-1').classList.toggle('active', currentServer === 1);
      document.getElementById('server-2').classList.toggle('active', currentServer === 2);
    }

    window.switchServer = function(srv) {
      currentServer = srv;
      updatePlayer();
      Toast(`Switched to Server ${srv}`, 'info');
    };

    window.changeEp = function(delta) {
      const next = currentEp + delta;
      if (next < 1) return;
      if (episodeList.length && next > episodeList.length) return;
      window.location.href = `watch.html?id=${malId}&ep=${next}&lang=${currentLang}`;
    };

    async function loadWatch() {
      try {
        const [details, epsRes, aniData] = await Promise.all([
          Jikan.details(malId),
          Jikan.episodes(malId, 1).catch(() => ({data:[]})),
          AniList.getByMalId(malId).catch(() => null)
        ]);

        animeData = details.data;
        episodeList = epsRes.data || [];
        anilistId = aniData?.id;

        document.getElementById('breadcrumb').innerHTML = `
          <a href="home.html">Home</a>
          <i data-lucide="chevron-right" class="icon-sm"></i>
          <a href="anime.html?id=${malId}">${escapeHtml(animeData.title_english || animeData.title)}</a>
          <i data-lucide="chevron-right" class="icon-sm"></i>
          <span>Episode ${currentEp}</span>
        `;

        updatePlayer();

        const epData = episodeList.find(e => (e.mal_id || e.number) == currentEp);
        document.getElementById('episode-desc').innerHTML = `
          <h2>Episode ${currentEp}${epData?.title ? ': ' + escapeHtml(epData.title) : ''}</h2>
          <p>${escapeHtml(epData?.synopsis || 'No synopsis available for this episode.')}</p>
        `;

        document.getElementById('episode-strip-wrap').innerHTML = `
          <h3 class="section-subtitle" style="margin-bottom:12px">Episodes</h3>
          ${EpisodeStrip(episodeList, currentEp, malId, currentLang)}
        `;

        const history = getHistory();
        const totalEpisodes = animeData.episodes || episodeList.length || 0;
        addToHistory(malId, animeData.title_english || animeData.title, animeData.images?.jpg?.image_url || '', currentEp, totalEpisodes);

        renderSidebar(animeData, aniData);
        if (window.lucide) lucide.createIcons();
        setupLazyImages();
        setupReveal();
      } catch (e) {
        console.error(e);
        document.getElementById('player-container').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--color-text-secondary)">Failed to load player.</div>';
      }
    }

    function renderSidebar(data, ani) {
      const poster = data.images?.jpg?.image_url || ani?.coverImage?.medium || '';
      document.getElementById('sidebar-anime').innerHTML = `
        <div class="sidebar-card reveal">
          <div class="sidebar-card-header">
            <img src="${poster}" alt="">
            <div class="sidebar-card-info">
              <h4>${escapeHtml(data.title_english || data.title)}</h4>
              <div class="meta">${data.score ? '&#9733; ' + data.score : ''} &bull; ${data.type || 'TV'}</div>
              <div class="meta" style="margin-top:4px">${(data.genres || []).slice(0,3).map(g=>g.name).join(', ')}</div>
            </div>
          </div>
          <a href="anime.html?id=${malId}" class="btn btn-secondary btn-sm" style="width:100%">View Details</a>
        </div>
      `;

      if (ani?.nextAiringEpisode?.airingAt) {
        document.getElementById('next-ep-card').style.display = 'block';
        CountdownTimer(ani.nextAiringEpisode.airingAt, 'countdown');
      }

      Jikan.recommendations(malId).then(res => {
        const recs = (res.data || []).slice(0, 4).map(r => r.entry).filter(Boolean);
        if (!recs.length) return;
        document.getElementById('sidebar-recs').innerHTML = `
          <h3 class="section-subtitle" style="margin-bottom:12px">You May Also Like</h3>
          ${recs.map(a => AnimeCard({...a, mal_id: a.mal_id, images: {jpg:{image_url:a.images?.jpg?.image_url}}}, {size:'sm'})).join('')}
        `;
        if (window.lucide) lucide.createIcons();
        setupLazyImages();
      }).catch(() => {});
    }

    document.addEventListener('DOMContentLoaded', () => {
      initCommon('');
      loadWatch();
    });
  </script>
</body>
</html>
