<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - NamiTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-container { max-width: 600px; margin: 100px auto 2rem; background: var(--surface); padding: 2rem; border-radius: 12px; text-align: center; }
        .profile-img-large { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 1rem; border: 4px solid var(--primary); }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg); color: white; outline: none; }
        .data-box { width: 100%; height: 100px; background: var(--bg); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); padding: 0.5rem; border-radius: 6px; margin-top: 1rem; }
    </style>
</head>
<body>
    <main>
        <div class="profile-container">
            <img src="" alt="Profile" class="profile-img-large" id="p-avatar">
            <h2 id="p-name" style="margin-bottom: 2rem;">Loading...</h2>

            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="input-name">
            </div>
            <div class="form-group">
                <label>Avatar URL</label>
                <input type="text" id="input-avatar">
            </div>
            <button class="btn btn-primary" id="save-profile" style="width: 100%; justify-content: center;">Save Changes</button>

            <hr style="border-color: rgba(255,255,255,0.05); margin: 2rem 0;">
            
            <h3 style="text-align: left; margin-bottom: 1rem;">Export / Import Data</h3>
            <p style="text-align: left; font-size: 0.85rem; color: var(--text-muted);">Copy this text to move your watch history and settings to another browser.</p>
            <textarea class="data-box" id="data-export"></textarea>
            <button class="btn" id="import-data" style="margin-top: 1rem; background: var(--surface-hover);">Import Data</button>
        </div>
    </main>

    <script src="js/user.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const profile = UserSystem.getProfile();
            
            document.getElementById('p-avatar').src = profile.avatarUrl;
            document.getElementById('p-name').textContent = profile.displayName;
            document.getElementById('input-name').value = profile.displayName;
            document.getElementById('input-avatar').value = profile.avatarUrl;
            document.getElementById('data-export').value = JSON.stringify(profile);

            document.getElementById('save-profile').addEventListener('click', () => {
                UserSystem.updateProfile({
                    displayName: document.getElementById('input-name').value,
                    avatarUrl: document.getElementById('input-avatar').value
                });
                window.location.reload();
            });

            document.getElementById('import-data').addEventListener('click', () => {
                try {
                    const newData = JSON.parse(document.getElementById('data-export').value);
                    localStorage.setItem('userProfile', JSON.stringify(newData));
                    alert('Data imported successfully!');
                    window.location.reload();
                } catch(e) {
                    alert('Invalid JSON data.');
                }
            });
        });
    </script>
</body>
</html>
