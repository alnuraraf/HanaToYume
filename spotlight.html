<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotlight — NamiTube Infinity</title>
  <meta name="description" content="Editorial anime spotlights, seasonal guides, and must-watch collections on NamiTube.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <style>
    .spotlight-hero { padding: 48px 16px; text-align: center; max-width: 800px; margin: 0 auto; }
    .spotlight-hero h1 { font-size: clamp(28px, 5vw, 44px); margin-bottom: 12px; }
    .spotlight-hero p { font-size: 16px; color: var(--nt-text-secondary); line-height: 1.6; }
    .spotlight-grid { display: grid; grid-template-columns: 1fr; gap: 24px; padding: 24px 0 48px; }
    @media (min-width: 768px) { .spotlight-grid { grid-template-columns: repeat(2, 1fr); } }
    .spotlight-card { position: relative; border-radius: var(--nt-radius-lg); overflow: hidden; min-height: 280px; background: var(--nt-bg-card); border: 1px solid var(--nt-border); transition: var(--nt-transition); }
    .spotlight-card:hover { border-color: var(--nt-accent-border); transform: translateY(-4px); }
    .spotlight-card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.35); }
    .spotlight-card-content { position: relative; z-index: 2; padding: 28px; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; min-height: 280px; }
    .spotlight-card-content h3 { font-size: 22px; margin-bottom: 8px; }
    .spotlight-card-content p { font-size: 14px; color: var(--nt-text-secondary); line-height: 1.5; }
    .spotlight-tag { display: inline-block; padding: 4px 12px; border-radius: var(--nt-radius-xl); background: var(--nt-accent-dim); border: 1px solid var(--nt-accent-border); color: var(--nt-accent); font-size: 12px; font-weight: 600; margin-bottom: 12px; width: fit-content; }
  </style>
</head>
<body>
  <header class="site-header" id="site-header" role="banner"></header>
  <div class="search-overlay" id="search-overlay">
    <div class="nt-container">
      <input type="text" placeholder="Search anime..." id="search-overlay-input" onkeydown="if(event.key==='Enter')window.location.href='search.html?q='+encodeURIComponent(this.value)">
    </div>
  </div>
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="mobile-drawer" id="mobile-drawer">
    <div class="drawer-nav" id="drawer-nav"></div>
  </div>
  <div class="rate-limit-banner" id="rate-limit-banner"></div>
  <div class="private-banner" id="private-banner">Personalisation features are unavailable in this browser mode.</div>

  <main id="main-content">
    <div class="spotlight-hero">
      <h1>Spotlight</h1>
      <p>Curated editorial collections, seasonal guides, and hidden gems handpicked for anime fans.</p>
    </div>
    <div class="nt-container">
      <div class="spotlight-grid" id="spotlight-grid"></div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer" role="contentinfo"></footer>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module">
    import { renderHeader, renderFooter, AnimeCard, initHeaderInteractions } from './js/components.js';
    import { jikan } from './js/api.js';
    import { isPrivateMode, showPrivateBanner, setupIntersectionReveal, setupLazyImages, escapeHtml } from './js/utils.js';

    document.getElementById('site-header').innerHTML = renderHeader('spotlight');
    document.getElementById('site-footer').innerHTML = renderFooter();
    initHeaderInteractions();
    if (isPrivateMode()) showPrivateBanner();

    const drawerNav = document.getElementById('drawer-nav');
    if (drawerNav) {
      drawerNav.innerHTML = `
        <a href="home.html">Home</a>
        <a href="discover.html">Discover</a>
        <a href="search.html">Search</a>
        <a href="schedule.html">Schedule</a>
        <a href="spotlight.html" class="active">Spotlight</a>
        <a href="library.html">Library</a>
        <a href="donate.html">Donate</a>
        <hr style="border:none;border-top:1px solid var(--nt-border);margin:12px 0;">
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      `;
    }

    const spotlights = [
      { title: 'Staff Picks', tag: 'Editorial', desc: 'The NamiTube team\'s favorite anime of all time.', endpoint: '/top/anime?filter=bypopularity&page=1', img: '' },
      { title: 'Seasonal Guide', tag: 'This Season', desc: 'Everything airing right now, ranked by hype.', endpoint: '/seasons/now?page=1', img: '' },
      { title: 'Hidden Gems', tag: 'Underrated', desc: 'High-quality anime that flew under the radar.', endpoint: '/top/anime?filter=favorite&page=2', img: '' },
      { title: 'Award Winners', tag: 'Acclaimed', desc: 'Anime that dominated awards and critic lists.', endpoint: '/top/anime?filter=bypopularity&page=1', img: '' },
      { title: 'Studio Spotlight', tag: 'Production', desc: 'Celebrating legendary animation studios.', endpoint: '/top/anime?filter=favorite&page=1', img: '' },
      { title: 'Must Watch', tag: 'Essential', desc: 'The absolute essentials every fan should see.', endpoint: '/top/anime?filter=bypopularity&page=1', img: '' }
    ];

    const grid = document.getElementById('spotlight-grid');
    grid.innerHTML = spotlights.map((s, i) => `
      <div class="spotlight-card reveal">
        <div class="spotlight-card-bg" id="spotlight-bg-${i}" style="background-image:url('')"></div>
        <div class="spotlight-card-content">
          <span class="spotlight-tag">${escapeHtml(s.tag)}</span>
          <h3>${escapeHtml(s.title)}</h3>
          <p>${escapeHtml(s.desc)}</p>
        </div>
      </div>
    `).join('');

    async function loadSpotlightImages() {
      for (let i = 0; i < spotlights.length; i++) {
        try {
          const data = await jikan(spotlights[i].endpoint);
          const item = data?.data?.[0];
          if (item?.images?.jpg?.large_image_url) {
            document.getElementById(`spotlight-bg-${i}`).style.backgroundImage = `url('${item.images.jpg.large_image_url}')`;
          }
        } catch (e) {}
      }
    }
    loadSpotlightImages();
    setupIntersectionReveal();
    lucide.createIcons();
  </script>
</body>
</html>
