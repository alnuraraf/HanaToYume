<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — NamiTube Infinity</title>
  <meta name="description" content="Latest anime news, release announcements, and industry updates on NamiTube.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <style>
    .news-hero { padding: 48px 16px; text-align: center; max-width: 800px; margin: 0 auto; }
    .news-hero h1 { font-size: clamp(28px, 5vw, 42px); margin-bottom: 12px; }
    .news-hero p { font-size: 16px; color: var(--nt-text-secondary); line-height: 1.6; }
    .news-grid { display: grid; grid-template-columns: 1fr; gap: 16px; padding: 24px 0 48px; }
    @media (min-width: 768px) { .news-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .news-grid { grid-template-columns: repeat(3, 1fr); } }
    .news-card { background: var(--nt-bg-card); border: 1px solid var(--nt-border); border-radius: var(--nt-radius-md); overflow: hidden; transition: var(--nt-transition); }
    .news-card:hover { border-color: var(--nt-accent-border); transform: translateY(-4px); }
    .news-card-img { width: 100%; aspect-ratio: 16/9; background: var(--nt-bg-elevated); object-fit: cover; }
    .news-card-body { padding: 16px; }
    .news-card-tag { font-size: 11px; color: var(--nt-accent); font-weight: 600; text-transform: uppercase; margin-bottom: 6px; }
    .news-card-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
    .news-card-desc { font-size: 13px; color: var(--nt-text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .news-card-date { font-size: 12px; color: var(--nt-text-muted); margin-top: 10px; }
    .featured-news { grid-column: 1 / -1; display: flex; flex-direction: column; }
    @media (min-width: 768px) { .featured-news { flex-direction: row; } }
    .featured-news .news-card-img { aspect-ratio: 16/9; }
    @media (min-width: 768px) { .featured-news .news-card-img { width: 50%; aspect-ratio: auto; } }
    .featured-news .news-card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  </style>
</head>
<body>
  <header class="site-header" id="site-header" role="banner"></header>
  <div class="search-overlay" id="search-overlay">
    <div class="nt-container">
      <input type="text" placeholder="Search anime..." id="search-overlay-input" onkeydown="if(event.key==='Enter')window.location.href='search.html?q='+encodeURIComponent(this.value)">
    </div>
  </div>
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="mobile-drawer" id="mobile-drawer">
    <div class="drawer-nav" id="drawer-nav"></div>
  </div>
  <div class="rate-limit-banner" id="rate-limit-banner"></div>
  <div class="private-banner" id="private-banner">Personalisation features are unavailable in this browser mode.</div>

  <main id="main-content">
    <div class="news-hero">
      <h1>Anime News</h1>
      <p>Stay updated with the latest anime announcements, release dates, and industry news.</p>
    </div>
    <div class="nt-container">
      <div class="news-grid" id="news-grid"></div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer" role="contentinfo"></footer>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module">
    import { renderHeader, renderFooter, initHeaderInteractions } from './js/components.js';
    import { jikan } from './js/api.js';
    import { isPrivateMode, showPrivateBanner, setupIntersectionReveal, escapeHtml } from './js/utils.js';

    document.getElementById('site-header').innerHTML = renderHeader('');
    document.getElementById('site-footer').innerHTML = renderFooter();
    initHeaderInteractions();
    if (isPrivateMode()) showPrivateBanner();

    const drawerNav = document.getElementById('drawer-nav');
    if (drawerNav) {
      drawerNav.innerHTML = `
        <a href="home.html">Home</a>
        <a href="discover.html">Discover</a>
        <a href="search.html">Search</a>
        <a href="schedule.html">Schedule</a>
        <a href="spotlight.html">Spotlight</a>
        <a href="library.html">Library</a>
        <a href="donate.html">Donate</a>
        <hr style="border:none;border-top:1px solid var(--nt-border);margin:12px 0;">
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      `;
    }

    const newsItems = [
      { tag: 'Featured', title: 'Top Airing Anime This Season', desc: 'Discover the most popular anime currently airing and what fans are talking about.', date: 'Today', featured: true },
      { tag: 'Release', title: 'New Season Announcements', desc: 'Several highly anticipated sequels have been confirmed for the upcoming season.', date: '2 days ago' },
      { tag: 'Industry', title: 'Studio Updates & Production News', desc: 'Latest updates from top animation studios around the world.', date: '3 days ago' },
      { tag: 'Adaptation', title: 'Manga to Anime Adaptations', desc: 'Exciting new manga series getting the anime treatment this year.', date: '5 days ago' },
      { tag: 'Award', title: 'Anime Awards Season Begins', desc: 'Nominations are open for the annual anime awards. Vote for your favorites.', date: '1 week ago' },
      { tag: 'Event', title: 'Upcoming Anime Conventions', desc: 'Major anime events and conventions happening around the globe.', date: '1 week ago' }
    ];

    async function loadNewsImages() {
      try {
        const data = await jikan('/top/anime?filter=airing&page=1');
        const items = data?.data || [];
        const grid = document.getElementById('news-grid');
        grid.innerHTML = newsItems.map((n, i) => {
          const img = items[i]?.images?.jpg?.image_url || '';
          return `
            <div class="news-card ${n.featured ? 'featured-news' : ''} reveal">
              ${img ? `<img class="news-card-img" src="${img}" alt="" loading="lazy">` : `<div class="news-card-img"></div>`}
              <div class="news-card-body">
                <div class="news-card-tag">${escapeHtml(n.tag)}</div>
                <div class="news-card-title">${escapeHtml(n.title)}</div>
                <div class="news-card-desc">${escapeHtml(n.desc)}</div>
                <div class="news-card-date">${escapeHtml(n.date)}</div>
              </div>
            </div>
          `;
        }).join('');
        setupIntersectionReveal();
      } catch (e) {
        document.getElementById('news-grid').innerHTML = '<p class="empty-state">Unable to load news at this time.</p>';
      }
    }

    loadNewsImages();
    lucide.createIcons();
  </script>
</body>
</html>
