<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NamiTube — Weekly Airing Schedule</title>
  <meta name="description" content="View weekly airing schedules of Japanese anime. Track broadcast countdown times and set customizable browser alerts matching your favourite shows.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  
  <!-- CSS Linkings -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/schedule.css">
</head>
<body>

  <!-- Hidden page identifier for schedule context initialization -->
  <div id="schedule-page-identifier" style="display:none;"></div>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Header standard placeholder -->
  <header class="header"></header>

  <!-- Main view container -->
  <main id="main-content" class="schedule-container">
    <div class="container">
      
      <!-- Top banner Countdown timer block -->
      <section class="countdown-header-banner reveal active">
        
        <div class="countdown-info-side">
          <span class="countdown-title" id="countdown-anime-title">Calculating nearest reminder...</span>
          <span class="countdown-subtitle" id="countdown-anime-subtitle">Set reminder bells to start ticking countdown timers.</span>
        </div>

        <div class="live-countdown-timer">
          
          <div class="time-block">
            <span class="time-val" id="timer-days">00</span>
            <span class="time-label">Days</span>
          </div>

          <div class="time-block">
            <span class="time-val" id="timer-hours">00</span>
            <span class="time-label">Hrs</span>
          </div>

          <div class="time-block">
            <span class="time-val" id="timer-mins">00</span>
            <span class="time-label">Mins</span>
          </div>

          <div class="time-block">
            <span class="time-val" id="timer-secs">00</span>
            <span class="time-label">Secs</span>
          </div>

        </div>

      </section>

      <!-- Day filter tab bar -->
      <section class="reveal">
        <div class="schedule-tabs-row">
          <button class="day-tab-btn" data-day="monday">Monday</button>
          <button class="day-tab-btn" data-day="tuesday">Tuesday</button>
          <button class="day-tab-btn" data-day="wednesday">Wednesday</button>
          <button class="day-tab-btn" data-day="thursday">Thursday</button>
          <button class="day-tab-btn" data-day="friday">Friday</button>
          <button class="day-tab-btn" data-day="friday" style="display: none;">Saturday</button> <!-- Jikan schedule uses standard lowercase weekday filters -->
          <button class="day-tab-btn" data-day="saturday">Saturday</button>
          <button class="day-tab-btn" data-day="sunday">Sunday</button>
        </div>
      </section>

      <!-- Schedule listings -->
      <section class="schedule-list" id="schedule-list-items">
        <!-- Injected via JS -->
      </section>

    </div>
  </main>

  <!-- Footer standard placeholder -->
  <footer class="footer"></footer>

  <!-- Core Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="js/schedule.js"></script>
</body>
</html>
