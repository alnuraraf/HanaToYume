<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Schedule — NamiTube</title>
  <meta name="description" content="Weekly anime airing schedule. See what's releasing today, set reminders, and never miss an episode." />
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/schedule.css" />
  <meta property="og:title" content="Schedule — NamiTube" />
  <meta property="og:description" content="Weekly anime airing schedule. See what's releasing today, set reminders, and never miss an episode." />
  <meta property="og:type" content="website" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div id="header-slot"></div>

  <main id="main" role="main" class="container schedule-wrap">
    <div class="schedule-head">
      <h1>Airing Schedule</h1>
      <p>Your weekly guide to new anime episodes. Set reminders and never miss a drop.</p>
    </div>

    <div class="next-up-card" id="nextUp" style="display:none"></div>

    <div class="day-tabs" id="dayTabs" role="tablist" aria-label="Day of week"></div>

    <div class="schedule-list" id="scheduleList" role="list" aria-live="polite"></div>
  </main>

  <div id="footer-slot"></div>

  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/storage.js" defer></script>
  <script src="js/components.js" defer></script>
  <script src="js/schedule.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const profile = NT.storage.getProfile();
      if (profile.preferences.accentColor) NT.utils.applyAccentColor(profile.preferences.accentColor);
      NT.components.injectChrome();
      await NT.schedulePage.init();
    });
  </script>
</body>
</html>
