<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - NamiTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .library-container { padding: 100px 5% 2rem; min-height: 70vh; }
        .history-list { display: flex; flex-direction: column; gap: 1rem; max-width: 800px; margin: 0 auto; }
        .history-item { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 1rem 2rem; border-radius: 8px; }
        .history-item a { font-weight: 600; color: var(--primary); }
    </style>
</head>
<body>
    <main class="library-container">
        <h2 class="section-title" style="text-align: center;">Continue Watching</h2>
        <div class="history-list" id="history-list">
            </div>
    </main>

    <script src="js/user.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const profile = UserSystem.getProfile();
            const list = document.getElementById('history-list');
            
            if (Object.keys(profile.watchHistory).length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Your history is empty.</p>';
            } else {
                for (const [malId, data] of Object.entries(profile.watchHistory)) {
                    // In a full app, you'd fetch the title using malId. Keeping it simple to avoid API spam on load.
                    list.innerHTML += `
                        <div class="history-item">
                            <span>Anime ID: ${malId}</span>
                            <a href="watch.html?id=${malId}&ep=${data.episode}" class="btn btn-primary">Resume EP ${data.episode}</a>
                        </div>
                    `;
                }
            }
        });
    </script>
</body>
</html>
