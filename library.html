<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NamiTube — Personal Anime Library</title>
  <meta name="description" content="Manage your personalized anime collections. Track viewing history, watchlist categories, favorite series, and export your entire profile library as a JSON file.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  
  <!-- CSS Linkings -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/library.css">
</head>
<body>

  <!-- Hidden page identifier for library context initialization -->
  <div id="library-page-identifier" style="display:none;"></div>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Header standard placeholder -->
  <header class="header"></header>

  <!-- Main view container -->
  <main id="main-content" class="library-container">
    <div class="container">
      
      <!-- Top header layout -->
      <section class="library-header reveal active">
        <h1 class="section-title" style="margin-bottom:0;">Personal Library</h1>
        <div class="library-actions">
          <button class="btn btn-secondary btn-outline" id="btn-export-library">
            <i data-lucide="download"></i> Export JSON
          </button>
        </div>
      </section>

      <!-- Tab select row -->
      <section class="reveal">
        <div class="library-tabs">
          <button class="library-tab-btn active" data-tab="watchlist">Watchlist</button>
          <button class="library-tab-btn" data-tab="favorites">Favourites</button>
          <button class="library-tab-btn" data-tab="history">Watch History</button>
        </div>
      </section>

      <!-- Filter Controls row (Watchlist specific) -->
      <section class="library-filters-row reveal" id="library-filters-bar-element">
        
        <!-- Left Side: Status filter -->
        <div class="filter-controls-group">
          <span style="font-size:0.85rem; color:var(--color-text-secondary); font-weight:500;">Filter by:</span>
          <select class="library-select" id="watchlist-status-filter-select">
            <option value="all">All Watchlist</option>
            <option value="plan">Plan to Watch</option>
            <option value="watching">Watching</option>
            <option value="completed">Completed</option>
            <option value="dropped">Dropped</option>
          </select>
        </div>

        <!-- Right Side: Sort order -->
        <div class="filter-controls-group">
          <span style="font-size:0.85rem; color:var(--color-text-secondary); font-weight:500;">Sort by:</span>
          <select class="library-select" id="watchlist-sort-select">
            <option value="added-desc">Date Added (Newest)</option>
            <option value="added-asc">Date Added (Oldest)</option>
            <option value="title-asc">Anime Title (A-Z)</option>
            <option value="score-desc">MAL Rating (Highest)</option>
          </select>
        </div>

      </section>

      <!-- Dynamic content grids list -->
      <section id="library-contents-container">
        <!-- Injected via library.js -->
      </section>

    </div>
  </main>

  <!-- Footer standard placeholder -->
  <footer class="footer"></footer>

  <!-- Core Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="js/library.js"></script>
</body>
</html>
