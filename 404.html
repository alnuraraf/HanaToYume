<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NamiTube — Redirecting</title>
    <script>
        (function() {
            const redirect = window.location.pathname + window.location.search + window.location.hash;
            sessionStorage.setItem('redirect', redirect);
            window.location.replace('/');
        })();
    </script>
</head>
<body style="background:#0f0f0f;color:#fff;font-family:sans-serif;text-align:center;padding-top:40vh;">
    <p>Redirecting to NamiTube...</p>
</body>
</html>
