  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">

  <style>
    .notfound-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; position: relative; overflow: hidden; }
    .notfound-bg { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(124,106,255,0.08) 0%, transparent 70%); z-index: 0; }
    .notfound-content { position: relative; z-index: 1; }
    .notfound-code { font-size: clamp(80px, 15vw, 160px); font-weight: 700; font-family: 'Space Grotesk', sans-serif; color: var(--nt-accent); line-height: 1; opacity: 0.25; margin-bottom: 8px; }
    .notfound-title { font-size: 24px; margin-bottom: 12px; }
    .notfound-desc { font-size: 15px; color: var(--nt-text-secondary); max-width: 420px; line-height: 1.6; margin-bottom: 24px; }
    .notfound-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .notfound-btn { padding: 12px 24px; border-radius: var(--nt-radius-md); font-weight: 600; font-size: 14px; transition: var(--nt-transition); }
    .notfound-btn-primary { background: var(--nt-accent); color: #fff; }
    .notfound-btn-primary:hover { background: #6b5ce7; }
    .notfound-btn-secondary { background: var(--nt-bg-elevated); border: 1px solid var(--nt-border); color: var(--nt-text-primary); }
    .notfound-btn-secondary:hover { border-color: var(--nt-border-hover); }
  </style>
</head>
<body>
  <div class="notfound-container">
    <div class="notfound-bg"></div>
    <div class="notfound-content">
      <div class="notfound-code">404</div>
      <h1 class="notfound-title">Page Not Found</h1>
      <p class="notfound-desc">The anime dimension you are looking for does not exist. It might have been moved, deleted, or never existed in this timeline.</p>
      <div class="notfound-actions">
        <a href="index.html" class="notfound-btn notfound-btn-primary">Return Home</a>
        <a href="search.html" class="notfound-btn notfound-btn-secondary">Search Anime</a>
      </div>
    </div>
  </div>
</body>
</html>
