<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Details — NamiTube</title>
  <meta name="description" content="Anime details, episodes, characters, and streaming on NamiTube.">
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/anime.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="anime-page">
  <div id="header-root"></div>

  <main id="main" class="container">
    <div id="anime-hero" class="anime-hero reveal"></div>

    <div class="anime-layout">
      <div class="anime-main">
        <div id="anime-header"></div>
        <div id="anime-synopsis"></div>
        <div id="anime-trailer"></div>
        <div id="anime-characters"></div>
        <div id="anime-staff"></div>
        <div id="anime-recommendations"></div>
        <div id="anime-reviews"></div>
        <div id="anime-episodes" class="episodes-section"></div>
      </div>

      <aside class="anime-sidebar" role="complementary">
        <div class="sidebar-sticky" id="anime-sidebar"></div>
      </aside>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/components.js"></script>
  <script>
    const params = getUrlParams();
    const malId = Number(params.id);
    if (!malId) { window.location.href = 'home.html'; }

    let animeData = null;
    let episodeList = [];
    let currentLang = 'sub';

    async function loadAnime() {
      try {
        const [details, episodesRes, charsRes, staffRes, recRes, revRes, aniData] = await Promise.all([
          Jikan.details(malId),
          Jikan.episodes(malId, 1).catch(() => ({data:[]})),
          Jikan.characters(malId).catch(() => ({data:[]})),
          Jikan.staff(malId).catch(() => ({data:[]})),
          Jikan.recommendations(malId).catch(() => ({data:[]})),
          Jikan.reviews(malId, 1).catch(() => ({data:[]})),
          AniList.getByMalId(malId).catch(() => null)
        ]);

        animeData = details.data;
        const eps = episodesRes.data || [];
        episodeList = eps;

        renderHero(animeData, aniData);
        renderHeader(animeData);
        renderSynopsis(animeData.synopsis);
        renderTrailer(animeData.trailer?.youtube_id, aniData?.trailer?.id, aniData?.trailer?.site);
        renderCharacters(charsRes.data || []);
        renderStaff(staffRes.data || []);
        renderRecommendations(recRes.data || []);
        renderReviews(revRes.data || []);
        renderSidebar(animeData, aniData);
        renderEpisodes(eps);

        if (window.lucide) lucide.createIcons();
        setupLazyImages();
        setupReveal();
      } catch (e) {
        console.error(e);
        document.querySelector('#main').innerHTML = '<div class="container" style="padding:80px 0;text-align:center"><h2>Failed to load anime details.</h2><a href="home.html" class="btn btn-primary" style="margin-top:16px">Back to Home</a></div>';
      }
    }

    function renderHero(data, ani) {
      const banner = ani?.bannerImage || data.images?.jpg?.large_image_url || '';
      document.getElementById('anime-hero').innerHTML = `
        <div class="anime-hero-bg" style="background-image:url('${banner}')"></div>
        <div class="anime-hero-overlay"></div>
      `;
    }

    function renderHeader(data) {
      const alt = [data.title_english, data.title_japanese].filter(Boolean);
      const genres = data.genres || [];
      document.getElementById('anime-header').innerHTML = `
        <h1 class="anime-title">${escapeHtml(data.title_english || data.title)}</h1>
        ${alt.length ? `<p class="anime-alt-titles">${alt.map(escapeHtml).join(' &bull; ')}</p>` : ''}
        <div class="anime-meta-row">
          ${data.score ? `<span class="meta-chip gold"><i data-lucide="star" class="icon-sm"></i> ${data.score}</span>` : ''}
          ${data.rank ? `<span class="meta-chip">Rank #${formatNumber(data.rank)}</span>` : ''}
          ${data.popularity ? `<span class="meta-chip">Popularity #${formatNumber(data.popularity)}</span>` : ''}
          <span class="meta-chip">${data.status || 'Unknown'}</span>
          <span class="meta-chip">${data.episodes || '?'} EPS</span>
          <span class="meta-chip">${data.duration || '?'}</span>
          <span class="meta-chip">${data.season || ''} ${data.year || ''}</span>
          ${data.studios?.[0] ? `<span class="meta-chip">${data.studios[0].name}</span>` : ''}
        </div>
        <div class="genre-list">
          ${genres.map(g => GenreTag(g.name)).join('')}
        </div>
      `;
    }

    function renderSynopsis(text) {
      if (!text) return;
      document.getElementById('anime-synopsis').innerHTML = `
        <div class="synopsis-box">
          <p class="synopsis-text collapsed" id="synopsis-text">${escapeHtml(text)}</p>
          <button class="read-more-btn" id="synopsis-toggle">Read more</button>
        </div>
      `;
      const toggle = document.getElementById('synopsis-toggle');
      const p = document.getElementById('synopsis-text');
      if (toggle && p) {
        toggle.addEventListener('click', () => {
          p.classList.toggle('collapsed');
          toggle.textContent = p.classList.contains('collapsed') ? 'Read more' : 'Read less';
        });
      }
    }

    function renderTrailer(jikanId, aniId, aniSite) {
      let embedUrl = '';
      if (jikanId) embedUrl = `https://www.youtube.com/embed/${jikanId}`;
      else if (aniId && aniSite === 'youtube') embedUrl = `https://www.youtube.com/embed/${aniId}`;
      if (!embedUrl) return;
      document.getElementById('anime-trailer').innerHTML = `
        <div class="trailer-section reveal">
          <h3 class="section-subtitle">Trailer</h3>
          <div class="trailer-container">
            <iframe src="${embedUrl}" title="Trailer" allowfullscreen loading="lazy"></iframe>
          </div>
        </div>
      `;
    }

    function renderCharacters(data) {
      if (!data.length) return;
      const chars = data.slice(0, 12);
      document.getElementById('anime-characters').innerHTML = `
        <div class="characters-section reveal">
          <h3 class="section-subtitle">Characters & Voice Actors</h3>
          <div class="char-row">
            ${chars.map(c => `
              <div class="char-card">
                <img data-src="${c.character?.images?.jpg?.image_url || ''}" alt="${escapeHtml(c.character?.name || '')}" loading="lazy">
                <div class="char-name">${escapeHtml(c.character?.name || '')}</div>
                <div class="char-role">${c.role || ''}</div>
                ${c.voice_actors?.[0] ? `<div class="va-name">${escapeHtml(c.voice_actors[0].person.name)}</div>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderStaff(data) {
      if (!data.length) return;
      const staff = data.slice(0, 8);
      document.getElementById('anime-staff').innerHTML = `
        <div class="staff-section reveal">
          <h3 class="section-subtitle">Staff</h3>
          <div class="staff-row">
            ${staff.map(s => `
              <div class="staff-card">
                <img data-src="${s.person?.images?.jpg?.image_url || ''}" alt="${escapeHtml(s.person?.name || '')}" loading="lazy">
                <div class="staff-name">${escapeHtml(s.person?.name || '')}</div>
                <div class="staff-role">${s.positions?.[0] || ''}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderRecommendations(data) {
      if (!data.length) return;
      const recs = data.slice(0, 6).map(r => r.entry).filter(Boolean);
      document.getElementById('anime-recommendations').innerHTML = `
        <div class="recommendations-section reveal">
          <h3 class="section-subtitle">Recommendations</h3>
          <div class="anime-grid">
            ${recs.map(a => AnimeCard({...a, mal_id: a.mal_id, images: {jpg:{image_url:a.images?.jpg?.image_url}}}, {size:'sm'})).join('')}
          </div>
        </div>
      `;
    }

    function renderReviews(data) {
      if (!data.length) return;
      const reviews = data.slice(0, 3);
      document.getElementById('anime-reviews').innerHTML = `
        <div class="reviews-section reveal">
          <h3 class="section-subtitle">Reviews</h3>
          <div class="reviews-list">
            ${reviews.map((r, i) => `
              <div class="review-card">
                <div class="review-header">
                  <span class="review-author">${escapeHtml(r.user?.username || 'User')}</span>
                  <span class="review-score">${r.score || 0}/10</span>
                </div>
                <p class="review-body collapsed" id="review-${i}">${escapeHtml(r.review || '')}</p>
                <button class="read-more-btn" onclick="document.getElementById('review-${i}').classList.toggle('collapsed');this.textContent=document.getElementById('review-${i}').classList.contains('collapsed')?'Read more':'Read less'">Read more</button>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderSidebar(data, ani) {
      const poster = data.images?.jpg?.large_image_url || ani?.coverImage?.large || '';
      const info = [
        ['Type', data.type],
        ['Source', data.source],
        ['Episodes', data.episodes || '?'],
        ['Status', data.status],
        ['Aired', data.aired?.string],
        ['Broadcast', data.broadcast?.string],
        ['Producers', data.producers?.map(p=>p.name).join(', ')],
        ['Licensors', data.licensors?.map(l=>l.name).join(', ')],
        ['Studios', data.studios?.map(s=>s.name).join(', ')],
        ['Genres', data.genres?.map(g=>g.name).join(', ')],
        ['Themes', data.themes?.map(t=>t.name).join(', ')],
        ['Demographics', data.demographics?.map(d=>d.name).join(', ')],
        ['Duration', data.duration],
        ['Rating', data.rating]
      ].filter(([_,v]) => v && String(v).trim());

      const score = data.score || 0;
      const breakdown = [
        [10, Math.round(score >= 9 ? 30 : score >= 7 ? 15 : 5)],
        [9, Math.round(score >= 8 ? 25 : 10)],
        [8, Math.round(score >= 7 ? 20 : 8)],
        [7, Math.round(score >= 6 ? 15 : 5)],
        [6, Math.round(score >= 5 ? 10 : 3)],
        [5, Math.round(score >= 4 ? 5 : 2)],
        [4, 2], [3, 1], [2, 1], [1, 1]
      ];

      const userRate = getRating(malId);

      document.getElementById('anime-sidebar').innerHTML = `
        <div class="sidebar-poster reveal">
          <img src="${poster}" alt="${escapeHtml(data.title_english || data.title)} poster">
        </div>
        <div class="score-breakdown reveal">
          <div class="breakdown-title">Score Distribution</div>
          ${breakdown.map(([label, pct]) => `
            <div class="breakdown-row">
              <span class="breakdown-label">${label}</span>
              <div class="breakdown-bar-bg"><div class="breakdown-bar-fill" style="width:${pct}%"></div></div>
            </div>
          `).join('')}
        </div>
        <table class="info-table reveal">
          ${info.map(([k,v]) => `<tr><td>${k}</td><td>${escapeHtml(String(v))}</td></tr>`).join('')}
        </table>
        <div class="sidebar-actions reveal">
          <button class="btn btn-primary watchlist-add" data-mal="${malId}" data-title="${escapeHtml(data.title_english || data.title)}" data-poster="${data.images?.jpg?.image_url || ''}" data-score="${data.score || 0}">
            <i data-lucide="plus"></i> Add to Watchlist
          </button>
          <button class="btn btn-secondary" id="fav-btn" onclick="toggleFav()">
            <i data-lucide="heart"></i> <span id="fav-text">${isFavorite(malId) ? 'Remove Favorite' : 'Add to Favorites'}</span>
          </button>
          <a href="watch.html?id=${malId}&ep=1&lang=sub" class="btn btn-secondary">
            <i data-lucide="play"></i> Mark as Watching
          </a>
        </div>
        <div class="user-rating-box reveal">
          <label>Your Rating</label>
          ${RatingStars(malId, userRate)}
        </div>
      `;

      document.querySelectorAll('.rating-stars .star-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = Number(btn.dataset.value);
          setRating(malId, val);
          btn.parentElement.querySelectorAll('.star-btn').forEach(b => {
            b.classList.toggle('active', Number(b.dataset.value) <= val);
          });
          Toast('Rating saved', 'success');
        });
      });
    }

    window.toggleFav = function() {
      const data = animeData;
      const added = toggleFavorite(malId, data.title_english || data.title, data.images?.jpg?.image_url || '', data.score || 0);
      document.getElementById('fav-text').textContent = added ? 'Remove Favorite' : 'Add to Favorites';
      Toast(added ? 'Added to favorites' : 'Removed from favorites', added ? 'success' : 'info');
    };

    function renderEpisodes(eps) {
      const container = document.getElementById('anime-episodes');
      const history = getHistory();
      const viewed = new Set(history.filter(h => h.malId === malId).map(h => h.episode));

      container.innerHTML = `
        <div class="episodes-header">
          <h3 class="section-subtitle">Episodes</h3>
          <div class="lang-toggle">
            <button class="${currentLang==='sub'?'active':''}" onclick="setLang('sub')">Sub</button>
            <button class="${currentLang==='dub'?'active':''}" onclick="setLang('dub')">Dub</button>
          </div>
        </div>
        <div class="episodes-grid">
          ${eps.length ? eps.map(ep => `
            <a href="watch.html?id=${malId}&ep=${ep.mal_id || ep.number || 1}&lang=${currentLang}" class="episode-card ${viewed.has(ep.mal_id || ep.number || 1) ? 'viewed' : ''}">
              <img src="${ep.images?.jpg?.image_url || data.images?.jpg?.image_url || ''}" alt="" loading="lazy">
              <div class="episode-info">
                <div class="episode-num">Episode ${ep.mal_id || ep.number || 1}</div>
                <div class="episode-title">${escapeHtml(ep.title || `Episode ${ep.mal_id || ep.number || 1}`)}</div>
              </div>
              ${viewed.has(ep.mal_id || ep.number || 1) ? '<i data-lucide="check-circle" class="episode-check"></i>' : ''}
            </a>
          `).join('') : '<p class="text-secondary">No episode data available.</p>'}
        </div>
      `;
    }

    window.setLang = function(lang) {
      currentLang = lang;
      renderEpisodes(episodeList);
      if (window.lucide) lucide.createIcons();
    };

    document.addEventListener('DOMContentLoaded', () => {
      initCommon('');
      loadAnime();
    });
  </script>
</body>
</html>
